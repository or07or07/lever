# Lever  Nginx reverse-proxy (lever-ec.com, behind Cloudflare proxy — Full (strict) mode)
upstream lever_app {
    server app:8500;
    keepalive 32;
}
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

# ---- HTTP server (redirect to HTTPS) ----
server {
    listen 80;
    listen [::]:80;
    server_name lever-ec.com www.lever-ec.com lever.test-test-now.com _;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS server ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name lever-ec.com www.lever-ec.com lever.test-test-now.com _;

    ssl_certificate     /etc/letsencrypt/live/lever-ec.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lever-ec.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=(), payment=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Content-Security-Policy — defense-in-depth for XSS. 'unsafe-inline' is
    # required for script/style because the SPA uses inline <script> blocks and
    # inline onclick handlers (a full refactor to nonces would be a large change);
    # everything else is locked down. Crucially, connect-src 'self' means that
    # even if a script somehow ran, it could not exfiltrate a stolen token to an
    # attacker-controlled host. External assets are pinned to cdnjs (Leaflet) and
    # OpenStreetMap tiles only. frame-ancestors 'none' blocks clickjacking.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: https://*.tile.openstreetmap.org; connect-src 'self'; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src 'none'; frame-ancestors 'none'; manifest-src 'self'; worker-src 'self'" always;

    location /ws/ {
        proxy_pass http://lever_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
    location /api/auth/ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://lever_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://lever_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }
    location /health {
        proxy_pass http://lever_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location ~ ^/(docs|redoc|openapi.json) {
        proxy_pass http://lever_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    location / {
        proxy_pass http://lever_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            proxy_pass http://lever_app;
            proxy_set_header Host $host;
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }
    location ~ /\. { deny all; return 404; }
    location ~* (wp-admin|wp-login|xmlrpc|phpmyadmin|\.php$) { deny all; return 404; }
}
