# =============================================================================
# Lever — Production Docker Compose (Hostinger VPS)
#
# Services:
#   app      — FastAPI application (internal only, port 8500)
#   db       — PostgreSQL 16 (internal only)
#   nginx    — Reverse proxy (ports 80/443) with TLS + security headers
#   certbot  — Let's Encrypt certificate auto-renewal
#
# Usage:
#   cd /opt/lever/deploy
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#   docker compose -f docker-compose.prod.yml --env-file .env.prod logs -f app
#   docker compose -f docker-compose.prod.yml --env-file .env.prod down
#
# Security:
#   - TLS 1.2/1.3 enforced via nginx
#   - HTTP → HTTPS redirect (301)
#   - Security headers: HSTS, CSP, X-Frame-Options, X-Content-Type-Options
#   - Internal network: DB and app not exposed to host
#   - Non-root app container
#   - Certbot auto-renewal every 12 hours
# =============================================================================

services:
  # ---------- PostgreSQL ----------
  db:
    image: postgres:16-alpine
    container_name: lever-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lever
      POSTGRES_USER: lever
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - lever-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lever -d lever"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Security: don't expose port to host
    # ports: ["5432:5432"]  # Only uncomment for debugging

  # ---------- Lever App ----------
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: lever-app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://lever:${DB_PASSWORD}@db:5432/lever
      SECRET_KEY: ${SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST:-smtp.hostinger.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USE_TLS: "false"
      SMTP_USE_SSL: "true"
      SMTP_USER: ${SMTP_USER:-noreply@test-test-now.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-placeholder}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@test-test-now.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Lever}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@lever.app}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DEBUG: "false"
      HOST: "0.0.0.0"
      PORT: "8500"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
    networks:
      - lever-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8500/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # ---------- Nginx Reverse Proxy ----------
  nginx:
    image: nginx:1.27-alpine
    container_name: lever-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - lever-internal
    # Reload nginx when certificates are renewed
    command: "/bin/sh -c 'while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g \"daemon off;\"'"

  # ---------- Certbot Auto-Renewal ----------
  certbot:
    image: certbot/certbot:latest
    container_name: lever-certbot
    restart: unless-stopped
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    # Check for renewal every 12 hours (Let's Encrypt recommends twice daily)
    # Certbot only renews when cert is within 30 days of expiry
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done'"

networks:
  lever-internal:
    driver: bridge

volumes:
  pgdata:
    driver: local
  app_logs:
    driver: local
