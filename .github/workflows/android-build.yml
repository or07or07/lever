name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'apps/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: [client, provider]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Verify Node version
        run: node --version && which node

      - name: Install Node dependencies
        run: npm ci

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ matrix.app }}-${{ hashFiles(format('apps/{0}/android/**/*.gradle*', matrix.app), format('apps/{0}/android/gradle/wrapper/gradle-wrapper.properties', matrix.app)) }}
          restore-keys: |
            gradle-${{ runner.os }}-${{ matrix.app }}-

      - name: Sync Capacitor Android project (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x apps/${{ matrix.app }}/android/gradlew

      - name: Build debug APK (${{ matrix.app }})
        working-directory: apps/${{ matrix.app }}/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lever-${{ matrix.app }}-debug-apk
          path: apps/${{ matrix.app }}/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
