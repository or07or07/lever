// Reputation detail (#/account/reputation)
async function renderReputation(el) {
  const back = '<button class="btn btn-outline" onclick="route(\'#/account\')">‹ ' + escapeHtml(_t('acct.back')) + '</button>';
  el.innerHTML = pageHeader(_t('acct.myReputation'), back) + '<div class="acct-wrap"><div class="empty"><div class="empty-icon">' + leverSpinner(52) + '</div></div></div>';
  let rep = null;
  try { rep = await get('/api/client/reputation'); }
  catch(e) {
    el.innerHTML = pageHeader(_t('acct.myReputation'), back) + '<div class="acct-wrap">' + alert_el('error', _t('acct.repError')) +
      '<button class="btn btn-outline" style="margin-top:10px" onclick="renderReputation(document.getElementById(\'content\'))">' + _t('misc.retry') + '</button></div>';
    return;
  }
  let body;
  if (!rep || rep.rating_count === 0) {
    body = '<div class="card"><div class="empty"><div class="empty-icon">⭐</div><h3>' + escapeHtml(_t('acct.noRatingTitle')) + '</h3><p style="color:var(--gray-500);font-size:.88rem;max-width:340px;margin:6px auto 0">' + escapeHtml(_t('acct.noRatingBody')) + '</p></div></div>';
  } else {
    const val = Number(rep.average_rating).toFixed(1);
    const dist = rep.distribution || {};
    const maxCount = Math.max(1, [5,4,3,2,1].reduce(function(m,s){return Math.max(m, dist[String(s)]||0);}, 0));
    const distHtml = [5,4,3,2,1].map(function(s){
      const c = dist[String(s)]||0;
      const pct = Math.round((c/maxCount)*100);
      return '<div class="rep-dist-row"><span class="rep-dist-star">' + s + ' ★</span><span class="rep-dist-bar"><span class="rep-dist-fill" style="width:' + pct + '%"></span></span><span>' + c + '</span></div>';
    }).join('');
    body = '<div class="card" style="text-align:center;margin-bottom:16px">' +
        '<div class="rep-big">' + val + '</div>' +
        '<div style="color:var(--gray-600);font-size:.88rem;margin-top:6px">' + escapeHtml(_t('acct.repFromPros').replace('{n}', rep.rating_count)) + '</div>' +
      '</div>' +
      '<div class="card" style="margin-bottom:16px"><div class="card-title" style="margin-bottom:10px">' + escapeHtml(_t('acct.repDistribution')) + '</div>' + distHtml + '</div>';
  }
  const guide = '<div class="card"><div class="card-title" style="margin-bottom:10px">' + escapeHtml(_t('acct.repGuideTitle')) + '</div><ul class="rep-guide" style="padding-left:18px;margin:0">' +
    ['g1','g2','g3','g4','g5','g6'].map(function(k){return '<li>' + escapeHtml(_t('acct.repGuide_'+k)) + '</li>';}).join('') + '</ul></div>';
  el.innerHTML = pageHeader(_t('acct.myReputation'), back) + '<div class="acct-wrap">' + body + guide + '</div>';
}

// ---- Incoming job-offer popup with acceptance countdown (provider) ----
// Polls GET /api/provider/offer every 5s and pops a bottom sheet the moment a
// dispatch offer targets this provider — no need to open the board manually.
// The countdown uses the SERVER-computed expires_in_seconds (device clock is
// never trusted); at 0 the sheet closes (the offer rotates server-side).
let _offerPoll = null, _offerShownId = null, _offerTick = null;
function startOfferPolling() {
  if (_offerPoll) return;
  _offerPoll = setInterval(pollProviderOffer, 5000);
  pollProviderOffer();
}
async function pollProviderOffer() {
  if (!_token || !_user || _user.role !== 'mechanic') return;
  if (document.getElementById('offer-popup')) return;   // one at a time
  try {
    const r = await get('/api/provider/offer');
    const o = r && r.offer;
    if (o && o.dispatch_id !== _offerShownId) showOfferPopup(o);
  } catch (e) { /* offline or gated — silent */ }
}
function showOfferPopup(o) {
  _offerShownId = o.dispatch_id;
  closeOfferPopup();
  const pay = o.budget_max != null
    ? (o.budget_min != null && o.budget_min !== o.budget_max ? fmtMoney(o.budget_min) + ' – ' : '') + fmtMoney(o.budget_max)
    : null;
  const el = document.createElement('div');
  el.id = 'offer-popup';
  el.className = 'offer-popup';
  el.setAttribute('role', 'alertdialog');
  el.setAttribute('aria-label', _t('offer.new'));
  el.innerHTML =
    '<div class="offer-head"><span class="offer-bolt" aria-hidden="true">⚡</span><strong>' + _t('offer.new') + '</strong>' +
      '<button class="offer-close" aria-label="' + _t('offer.later') + '" onclick="closeOfferPopup()">✕</button></div>' +
    '<div class="offer-title">' + escapeHtml(o.title || '') + '</div>' +
    (pay ? '<div class="offer-pay">💵 ' + _t('price.clientPays') + ': <strong>' + pay + '</strong></div>' +
           '<div class="offer-keep">' + _t('price.youKeep100') + '</div>' : '') +
    '<div class="offer-timer-track"><div class="offer-timer-fill" id="offer-timer-fill"></div></div>' +
    '<div class="offer-timer-text"><span id="offer-seconds">' + o.expires_in_seconds + '</span> ' + _t('offer.secondsLeft') + '</div>' +
    '<button class="offer-accept" onclick="acceptOfferFromPopup(' + o.request_id + ')">✓ ' + _t('offer.accept') + '</button>';
  document.body.appendChild(el);
  try { playNotifSound(); } catch (e) {}
  const deadline = Date.now() + o.expires_in_seconds * 1000;
  const windowMs = (o.window_seconds || 30) * 1000;
  _offerTick = setInterval(function () {
    const left = deadline - Date.now();
    if (left <= 0) { closeOfferPopup(); return; }
    const fill = document.getElementById('offer-timer-fill');
    const sec = document.getElementById('offer-seconds');
    if (fill) fill.style.width = Math.max(0, Math.min(100, (left / windowMs) * 100)) + '%';
    if (sec) sec.textContent = Math.ceil(left / 1000);
  }, 200);
}
async function acceptOfferFromPopup(requestId) {
  try {
    const job = await post('/api/provider/board/' + requestId + '/accept');
    closeOfferPopup();
    route('#/job/' + job.id);
  } catch (e) {
    closeOfferPopup();
    showToast(_t('offer.taken'), 'error');
  }
}
function closeOfferPopup() {
  if (_offerTick) { clearInterval(_offerTick); _offerTick = null; }
  const el = document.getElementById('offer-popup');
  if (el) el.remove();
}

// Dynamic job transitions based on profession
function getJobTransitions(professionKey) {
  const p = _professions[professionKey];
  if (!p || !p.job_statuses) {
    // Fallback mechanic flow
    return {accepted:['en_route','cancelled'],en_route:['diagnosing','cancelled'],diagnosing:['repairing','cancelled'],repairing:['completed','cancelled']};
  }
  const statuses = p.job_statuses;
  const transitions = {};
  for (let i = 0; i < statuses.length - 2; i++) { // -2 to skip completed and cancelled
    const s = statuses[i];
    if (s === 'completed' || s === 'cancelled') continue;
    const next = statuses[i+1];
    transitions[s] = [next, 'cancelled'];
  }
  return transitions;
}

function statusLabel(s) {
  var tkey='stlbl.'+s; var lb=_t(tkey);
  if (lb!==tkey) return lb;
  var labels = {
    en_route:'En Route', diagnosing:'Diagnosing', repairing:'Repairing',
    inspecting:'Inspecting', servicing:'Servicing', working:'Working',
    assessing:'Assessing', prepping:'Prepping', washing:'Washing',
    completed:'Mark Complete', cancelled:'Cancel Job', accepted:'Accepted'
  };
  return labels[s] || s.charAt(0).toUpperCase() + s.slice(1).replace('_',' ');
}

async function renderMyServices(el) {
  const services = await get('/api/provider/services');
  // Multi-profession: the backend returns the FULL catalog across professions.
  // Group by category (profession) into expandable sections + search so long
  // lists stay usable (spec §7).
  const groups = {};
  services.forEach(s => { (groups[s.category] = groups[s.category] || []).push(s); });
  const cats = Object.keys(groups).sort((a, b) => (profLabel(a) || a).localeCompare(profLabel(b) || b));
  const activeCount = services.filter(s => s.is_active).length;
  el.innerHTML = `
    ${pageHeader(_t('psvc.title'), '<button class="btn btn-outline" onclick="route(\'#/profile\')">' + _t('guest.back') + '</button>')}
    <div class="card" style="max-width:680px">
      <p style="color:var(--gray-600);font-size:.88rem;margin-bottom:6px">${_t('psvc.subtitle')}</p>
      <p style="color:var(--gray-400);font-size:.8rem;margin-bottom:12px">${_t('psvc.allOffTip')}</p>
      <input id="psvc-search" type="search" class="psvc-search" placeholder="${_t('psvc.search')}" oninput="filterPsvc()" aria-label="${_t('psvc.search')}">
      <div id="psvc-count" class="psvc-count">${_t('psvc.selectedCount').replace('{n}', activeCount)}</div>
      <div id="psvc-empty" class="psvc-empty" hidden>${_t('psvc.noMatch')}</div>
      <div id="psvc-list">${cats.map(cat => `
        <details class="psvc-group" data-group="${escapeHtml(cat)}"${groups[cat].some(s => s.is_active) ? ' open' : ''}>
          <summary class="psvc-group-head"><span>${escapeHtml(profLabel(cat) || cat)}</span><span class="psvc-group-n" data-count="${escapeHtml(cat)}">${groups[cat].filter(s => s.is_active).length}/${groups[cat].length}</span></summary>
          <div class="psvc-group-body">${groups[cat].map(s => psvcRow(s)).join('')}</div>
        </details>`).join('')}</div>
      <div id="psvc-msg" style="margin-top:12px"></div>
      <button class="btn btn-primary" style="margin-top:14px" onclick="savePsvcSelection()">${_t('psvc.save')}</button>
    </div>`;
}
function _psvcNorm(s) { return String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase(); }
function filterPsvc() {
  const q = _psvcNorm((document.getElementById('psvc-search') || {}).value);
  let anyAtAll = false;
  document.querySelectorAll('#psvc-list .psvc-group').forEach(g => {
    let visible = 0;
    g.querySelectorAll('[data-key]').forEach(row => {
      const show = !q || _psvcNorm(row.getAttribute('data-name')).includes(q);
      row.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    g.style.display = visible ? '' : 'none';
    if (q && visible) g.open = true;
    if (visible) anyAtAll = true;
  });
  const empty = document.getElementById('psvc-empty');
  if (empty) empty.hidden = anyAtAll;
}
function updatePsvcCounts() {
  let total = 0;
  document.querySelectorAll('#psvc-list .psvc-group').forEach(g => {
    const rows = g.querySelectorAll('[data-key]');
    let active = 0;
    rows.forEach(r => { const cb = r.querySelector('[data-psvc-active]'); if (cb && cb.checked) active++; });
    total += active;
    const n = g.querySelector('.psvc-group-n');
    if (n) n.textContent = active + '/' + rows.length;
  });
  const c = document.getElementById('psvc-count');
  if (c) c.textContent = _t('psvc.selectedCount').replace('{n}', total);
}
function psvcRow(s) {
  const locked = !s.selectable;
  const nm = (_lang === 'en' ? s.name_en : s.name_es) || '';
  return '<div style="display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--gray-100)' + (locked ? ';opacity:.55' : '') + '" data-key="' + s.service_key + '" data-cat="' + escapeHtml(s.category) + '" data-name="' + escapeHtml(nm.toLowerCase()) + '">' +
    '<input type="checkbox" data-psvc-active="' + s.service_key + '" ' + (s.is_active ? 'checked' : '') + (locked ? ' disabled' : '') + ' style="width:20px;height:20px;flex-shrink:0" onchange="onPsvcToggle(this)">' +
    '<span style="font-size:1.1rem;flex-shrink:0">' + s.icon + '</span>' +
    '<div style="flex:1;min-width:0">' +
      '<div style="font-weight:600;font-size:.88rem">' + escapeHtml(_lang === 'en' ? s.name_en : s.name_es) + '</div>' +
      (locked ? '<div style="font-size:.75rem;color:var(--danger)" title="' + _t('psvc.needsVerificationTip') + '">🔒 ' + _t('psvc.needsVerification') + '</div>'
              : '<div style="font-size:.75rem;color:var(--gray-500)">' + _t('guest.pt.' + s.pricing_type) + '</div>') +
    '</div>' +
    (!locked && (s.pricing_type === 'fixed' || s.pricing_type === 'hourly' || s.pricing_type === 'starting_at')
      ? '<input type="number" min="0" data-psvc-price="' + s.service_key + '" value="' + (s.price != null ? s.price : '') + '" placeholder="' + _t('psvc.priceLabel') + '" style="width:100px;padding:6px 8px;border:1px solid var(--gray-200);border-radius:8px;font-size:.82rem" ' + (s.is_active ? '' : 'disabled') + '>'
      : '') +
  '</div>';
}
function onPsvcToggle(cb) {
  const priceInput = cb.closest('[data-key]')?.querySelector('[data-psvc-price]');
  if (priceInput) priceInput.disabled = !cb.checked;
  updatePsvcCounts();
}
async function savePsvcSelection() {
  const rows = document.querySelectorAll('#psvc-list [data-key]');
  const selected = [];
  rows.forEach(row => {
    const cb = row.querySelector('[data-psvc-active]');
    if (cb && !cb.disabled && cb.checked) {
      const priceInput = row.querySelector('[data-psvc-price]');
      const priceVal = priceInput && priceInput.value !== '' ? parseFloat(priceInput.value) : null;
      selected.push({service_key: cb.getAttribute('data-psvc-active'), price: priceVal});
    }
  });
  const msgEl = document.getElementById('psvc-msg');
  try {
    await api('PUT', '/api/provider/services', {services: selected});
    msgEl.innerHTML = alert_el('success', _t('psvc.saved'));
  } catch(e) {
    msgEl.innerHTML = alert_el('error', e.message);
  }
}

async function renderMessages(el, jobId) {
  if (!jobId) {
    const role = _user.role;
    let jobs = [];
    if (role==='client') {
      const reqs = await get('/api/client/requests');
      const withJobs = reqs.filter(r=>r.job || (r.status !== 'pending' && r.status !== 'cancelled'));
      for (const r of withJobs) {
        const full = await get('/api/client/requests/'+r.id);
        if (full.job) jobs.push({id:full.job.id, title:r.title, status:full.job.status, profession_type:r.profession_type});
      }
    } else if (role==='mechanic') {
      const myJobs = await get('/api/provider/jobs');
      jobs = myJobs.map(j=>({id:j.id, title:j.request?.title||'Job #'+j.id, status:j.status, profession_type:j.request?.profession_type}));
    }
    el.innerHTML = pageHeader('Messages');
    if (jobs.length===0) {
      el.innerHTML += emptyState('<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>','No conversations yet','Conversations appear when you have active jobs');
      return;
    }
    el.innerHTML += jobs.map(j=>`
      <div class="card" style="cursor:pointer" onclick="route('#/chat/${j.id}')">
        <div class="card-header">
          <div><div class="card-title">Job #${j.id} \u2014 ${escapeHtml(j.title)}</div><div class="card-subtitle">${profBadge(j.profession_type)}</div></div>
          <div style="display:flex;align-items:center;gap:8px">${badge(j.status)}<span style="color:var(--brand)">\u2192</span></div>
        </div>
      </div>`).join('');
    return;
  }

  const msgs = await get('/api/messages/job/'+jobId);
  let otherUserId = null;
  try {
    if (_user.role === 'mechanic') {
      const job = await get('/api/provider/jobs/'+jobId);
      otherUserId = job.request?.client_id ?? null;
    } else if (_user.role === 'client') {
      const job = await get('/api/client/jobs/'+jobId);
      otherUserId = job.mechanic_id ?? null;
    }
  } catch(e) { /* non-fatal \u2014 report/block buttons just won't render */ }

  el.innerHTML = `
    ${pageHeader('Chat \u2014 Job #'+jobId, `<button class="btn btn-outline" onclick="route('#/messages')">\u2190 Back</button>`)}
    ${otherUserId!=null?`<div style="display:flex;gap:8px;justify-content:flex-end;margin-bottom:8px">
      <button class="btn btn-ghost" style="font-size:.78rem;padding:4px 10px" onclick="showReportModal('user',${otherUserId})">${_t('report.userBtn')}</button>
      <button class="btn btn-ghost" style="font-size:.78rem;padding:4px 10px;color:var(--danger)" onclick="blockUserWithConfirm(${otherUserId})">${_t('report.blockBtn')}</button>
    </div>`:''}
    <div class="card" style="padding:0">
      <div class="chat-wrap">
        <div class="chat-messages" id="chat-msgs">
          ${msgs.length===0?'<div style="text-align:center;color:var(--gray-400);padding:24px">No messages yet</div>':''}
          ${msgs.map(m=>`
            <div class="msg ${m.sender_id===_user.id?'msg-mine':'msg-other'}">
              ${escapeHtml(m.content)}
              <div class="msg-meta">${fmtTime(m.created_at)}</div>
            </div>`).join('')}
        </div>
        <div class="chat-input-row">
          <input id="chat-input" placeholder="Type a message\u2026" onkeydown="if(event.key==='Enter')sendMsg(${jobId})">
          <button class="btn btn-primary" onclick="sendMsg(${jobId})">Send</button>
        </div>
      </div>
    </div>`;
  const cm = document.getElementById('chat-msgs');
  if (cm) cm.scrollTop = cm.scrollHeight;
}

async function sendMsg(jobId) {
  const input = document.getElementById('chat-input');
  const content = input.value.trim();
  if (!content) return;
  try {
    await post('/api/messages/job/'+jobId, {content});
    input.value = '';
    renderMessages(document.getElementById('content'), String(jobId));
  } catch(e) {
    alert('Failed to send message: ' + e.message);
  }
}

function setupCodeInputs() {
  const container = document.getElementById('code-inputs');
  if (!container) return;
  const inputs = container.querySelectorAll('input');

  inputs.forEach((inp, i) => {
    inp.addEventListener('input', (e) => {
      const val = e.target.value.replace(/[^0-9]/g, '');
      e.target.value = val.charAt(0) || '';
      if (val && i < inputs.length - 1) {
        inputs[i + 1].focus();
      }
      // Auto-submit when all 6 digits entered
      if (i === inputs.length - 1 && val) {
        const code = Array.from(inputs).map(x => x.value).join('');
        if (code.length === 6) doVerifyEmail();
      }
    });

    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && i > 0) {
        inputs[i - 1].focus();
        inputs[i - 1].value = '';
      }
    });

    // Handle paste
    inp.addEventListener('paste', (e) => {
      e.preventDefault();
      const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
      for (let j = 0; j < Math.min(paste.length, inputs.length - i); j++) {
        inputs[i + j].value = paste[j];
      }
      const nextIdx = Math.min(i + paste.length, inputs.length - 1);
      inputs[nextIdx].focus();
      // Auto-submit if pasted full code
      if (paste.length >= 6 - i) {
        const code = Array.from(inputs).map(x => x.value).join('');
        if (code.length === 6) setTimeout(() => doVerifyEmail(), 100);
      }
    });
  });

  // Focus first input
  inputs[0]?.focus();
}

function startResendCooldown(seconds) {
  _verifyResendCooldown = seconds;
  const btn = document.getElementById('resend-btn');
  const timer = document.getElementById('resend-timer');
  if (btn) btn.disabled = true;

  if (_verifyResendTimer) clearInterval(_verifyResendTimer);
  _verifyResendTimer = setInterval(() => {
    _verifyResendCooldown--;
    if (timer) timer.textContent = _verifyResendCooldown > 0 ? `Resend available in ${_verifyResendCooldown}s` : '';
    if (_verifyResendCooldown <= 0) {
      clearInterval(_verifyResendTimer);
      if (btn) btn.disabled = false;
    }
  }, 1000);
}

async function doVerifyEmail() {
  const inputs = document.querySelectorAll('#code-inputs input');
  const code = Array.from(inputs).map(x => x.value).join('');
  if (code.length !== 6) {
    document.getElementById('verify-msg').innerHTML = alert_el('error', 'Please enter all 6 digits');
    return;
  }

  const btn = document.getElementById('verify-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Verifying\u2026'; }

  try {
    const data = await post('/api/auth/verify-email', { code });
    if (data.success) {
      // Update local state
      _user.email_verified = true;
      localStorage.setItem('lever_user', JSON.stringify(_user));

      // Show success animation
      inputs.forEach(inp => inp.classList.add('success'));
      document.getElementById('verify-msg').innerHTML = alert_el('success', 'Email verified! Redirecting\u2026');

      setTimeout(() => route('#/'), 1200);
    } else {
      inputs.forEach(inp => { inp.classList.add('error'); inp.value = ''; });
      setTimeout(() => inputs.forEach(inp => inp.classList.remove('error')), 500);
      document.getElementById('verify-msg').innerHTML = alert_el('error', data.message);
      if (btn) { btn.disabled = false; btn.textContent = 'Verify Email'; }
      inputs[0]?.focus();
    }
  } catch (e) {
    document.getElementById('verify-msg').innerHTML = alert_el('error', e.message || 'Verification failed');
    if (btn) { btn.disabled = false; btn.textContent = 'Verify Email'; }
  }
}

async function doResendCode() {
  const btn = document.getElementById('resend-btn');
  if (btn) btn.disabled = true;
  try {
    const data = await post('/api/auth/resend-verification', {});
    if (data.success) {
      document.getElementById('verify-msg').innerHTML = alert_el('success', 'New code sent to your email');
      startResendCooldown(data.cooldown_seconds || 60);
    } else {
      document.getElementById('verify-msg').innerHTML = alert_el('error', data.message);
      if (data.cooldown_seconds > 0) {
        startResendCooldown(data.cooldown_seconds);
      }
    }
  } catch (e) {
    document.getElementById('verify-msg').innerHTML = alert_el('error', e.message || 'Failed to resend');
  }
}

async function doLogin() {
  const email = document.getElementById('l-email').value.trim();
  const pass  = document.getElementById('l-pass').value;
  try {
    const data = await post('/api/auth/login', {email, password:pass});
    if (data.mfa_required) {
      renderMfaChallenge(data.mfa_token, email);
      return;
    }
    if (APP_FLAVOR_ROLE && data.role !== APP_FLAVOR_ROLE) {
      const appName = APP_FLAVOR === 'provider' ? 'Lever' : 'Lever Provider';
      document.getElementById('l-err').innerHTML = alert_el('error',
        `Esta cuenta es de ${data.role === 'mechanic' ? 'proveedor' : 'cliente'}. Usa la app "${appName}" para iniciar sesión.`);
      return;
    }
    login(data.access_token, {id:data.user_id, email, role:data.role, profession:data.profession||null, email_verified:data.email_verified!==false});
    await loadProfessions();
    if (data.email_verified === false) { route('#/verify-email'); }
    else { route('#/'); }
  } catch(e) {
    document.getElementById('l-err').innerHTML = alert_el('error', e.message);
  }
}

async function submitMfaChallenge() {
  const code = document.getElementById('mfa-code').value.trim();
  const errEl = document.getElementById('mfa-err');
  try {
    const data = await post('/api/auth/mfa/verify-login', {mfa_token: window._mfaPendingToken, code});
    login(data.access_token, {id:data.user_id, email:window._mfaPendingEmail||'', role:data.role, profession:data.profession||null, email_verified:data.email_verified!==false});
    window._mfaPendingToken = null;
    window._mfaPendingEmail = null;
    await loadProfessions();
    route('#/');
  } catch(e) {
    errEl.innerHTML = alert_el('error', e.message);
  }
}

async function doRegister() {
  const email = document.getElementById('r-email').value.trim();
  const pass  = document.getElementById('r-pass').value;
  const role  = document.getElementById('r-role').value;
  const profession = role === 'mechanic' ? document.getElementById('r-profession').value : undefined;
  const acceptedTerms = document.getElementById('r-accept-terms').checked;
  const dob = document.getElementById('r-dob').value;   // YYYY-MM-DD
  if (!acceptedTerms) {
    document.getElementById('r-err').innerHTML = alert_el('error', _t('auth.mustAcceptTerms'));
    return;
  }
  // Usability only — the backend recomputes eligibility and is authoritative.
  if (!dob) {
    document.getElementById('r-err').innerHTML = alert_el('error', _t('auth.dobRequired'));
    return;
  }
  try {
    const data = await post('/api/auth/register', {email, password:pass, role, accepted_terms: acceptedTerms, date_of_birth: dob, ...(profession && {profession})});
    login(data.access_token, {id:data.user_id, email, role:data.role, profession:data.profession||profession||null, email_verified:false});
    await loadProfessions();
    route('#/verify-email');
  } catch(e) {
    const msg = e.message || '';
    let html;
    if (/MINIMUM_AGE_REQUIREMENT_NOT_MET/i.test(msg)) {
      html = '<strong>' + escapeHtml(_t('auth.underageTitle')) + '</strong><br>' + escapeHtml(_t('auth.underage'));
    } else if (/INVALID_DATE_OF_BIRTH/i.test(msg)) {
      html = escapeHtml(_t('auth.dobInvalid'));
    } else {
      html = escapeHtml(msg);
    }
    document.getElementById('r-err').innerHTML = alert_el('error', html);
  }
}

function setupResetCodeInputs() {
  var container = document.getElementById('reset-code-inputs');
  if (!container) return;
  var inputs = container.querySelectorAll('input');

  inputs.forEach(function(inp, i) {
    inp.addEventListener('input', function(e) {
      var val = e.target.value.replace(/[^0-9]/g, '');
      e.target.value = val.charAt(0) || '';
      if (val && i < inputs.length - 1) inputs[i + 1].focus();
    });
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !e.target.value && i > 0) {
        inputs[i - 1].focus();
        inputs[i - 1].value = '';
      }
      if (e.key === 'Enter') doResetVerify();
    });
    inp.addEventListener('paste', function(e) {
      e.preventDefault();
      var paste = (e.clipboardData || window.clipboardData).getData('text').replace(/[^0-9]/g, '');
      for (var j = 0; j < Math.min(paste.length, inputs.length - i); j++) {
        inputs[i + j].value = paste[j];
      }
      var nextIdx = Math.min(i + paste.length, inputs.length - 1);
      inputs[nextIdx].focus();
    });
  });
  inputs[0]?.focus();
}

function startResetResendCooldown(seconds) {
  _resetResendCooldown = seconds;
  var btn = document.getElementById('reset-resend-btn');
  var timer = document.getElementById('reset-resend-timer');
  if (btn) btn.disabled = true;

  if (_resetResendTimer) clearInterval(_resetResendTimer);
  _resetResendTimer = setInterval(function() {
    _resetResendCooldown--;
    if (timer) timer.textContent = _resetResendCooldown > 0 ? (_lang === 'es' ? 'Reenviar disponible en ' + _resetResendCooldown + 's' : 'Resend available in ' + _resetResendCooldown + 's') : '';
    if (_resetResendCooldown <= 0) {
      clearInterval(_resetResendTimer);
      if (btn) btn.disabled = false;
    }
  }, 1000);
}

async function doResetRequest() {
  var email = document.getElementById('reset-email')?.value.trim();
  if (!email) {
    document.getElementById('reset-msg').innerHTML = alert_el('error', _lang === 'es' ? 'Por favor ingresa tu correo electr\u00f3nico' : 'Please enter your email address');
    return;
  }
  var btn = document.getElementById('reset-send-btn');
  if (btn) { btn.disabled = true; btn.textContent = _lang === 'es' ? 'Enviando...' : 'Sending...'; }
  try {
    await post('/api/auth/reset-password-request', {email: email});
    _resetEmail = email;
    renderResetPassword('code');
  } catch(e) {
    document.getElementById('reset-msg').innerHTML = alert_el('error', e.message);
    if (btn) { btn.disabled = false; btn.textContent = _t('auth.sendCode'); }
  }
}

async function doResetResend() {
  try {
    await post('/api/auth/reset-password-request', {email: _resetEmail});
    showToast(_lang === 'es' ? 'C\u00f3digo reenviado' : 'Code resent', 'success');
    startResetResendCooldown(60);
  } catch(e) {
    showToast(e.message, 'error');
  }
}

async function doResetVerify() {
  var container = document.getElementById('reset-code-inputs');
  if (!container) return;
  var inputs = container.querySelectorAll('input');
  var code = Array.from(inputs).map(function(x) { return x.value; }).join('');
  var newPass = document.getElementById('reset-new-pass')?.value;

  if (code.length !== 6) {
    document.getElementById('reset-msg').innerHTML = alert_el('error', _lang === 'es' ? 'Ingresa el c\u00f3digo de 6 d\u00edgitos' : 'Enter the 6-digit code');
    return;
  }
  if (!newPass || newPass.length < 8) {
    document.getElementById('reset-msg').innerHTML = alert_el('error', _lang === 'es' ? 'La contrase\u00f1a debe tener al menos 8 caracteres' : 'Password must be at least 8 characters');
    return;
  }
  if (!/[A-Z]/.test(newPass) || !/[0-9]/.test(newPass)) {
    document.getElementById('reset-msg').innerHTML = alert_el('error', _lang === 'es' ? 'La contrase\u00f1a debe incluir 1 may\u00fascula y 1 n\u00famero' : 'Password must include 1 uppercase letter and 1 number');
    return;
  }

  var btn = document.getElementById('reset-confirm-btn');
  if (btn) { btn.disabled = true; btn.textContent = _lang === 'es' ? 'Verificando...' : 'Verifying...'; }
  try {
    await post('/api/auth/reset-password-verify', {email: _resetEmail, code: code, new_password: newPass});
    renderResetPassword('success');
  } catch(e) {
    document.getElementById('reset-msg').innerHTML = alert_el('error', e.message);
    if (btn) { btn.disabled = false; btn.textContent = _t('auth.confirmReset'); }
    inputs.forEach(function(inp) { inp.classList.add('error'); });
    setTimeout(function() { inputs.forEach(function(inp) { inp.classList.remove('error'); }); }, 600);
  }
}

let _market = {code:'GYE', city:'Guayaquil', province:'Guayas', country_name:'Ecuador', currency:'USD'};

const GUEST_DRAFT_TTL_MS = 7 * 24 * 60 * 60 * 1000; // 7 days
const POPULAR_SERVICE_KEYS = ['standard_cleaning','faucet_leak_repair','furniture_assembly','grass_cutting','ac_maintenance','computer_diagnosis','mens_haircut','car_wash'];

async function loadMarket() {
  try { _market = await api('GET', '/api/market', undefined, true); } catch(e) { /* keep default */ }
  return _market;
}
async function loadCatalog() {
  if (_catalog) return _catalog;
  loadMarket(); // fire-and-forget; the default covers the UI until it lands
  // Serve a cached copy instantly (offline-friendly), refresh in background
  try {
    const cached = JSON.parse(localStorage.getItem('lever_catalog_cache') || 'null');
    if (cached && cached.services && cached.services.length) _catalog = cached;
  } catch(e) { /* corrupt cache — ignore */ }
  try {
    const fresh = await api('GET', '/api/catalog', undefined, true);
    _catalog = fresh;
    try { localStorage.setItem('lever_catalog_cache', JSON.stringify(fresh)); } catch(e) {}
  } catch(e) {
    if (!_catalog) throw e; // no cache and no network — caller shows error state
  }
  return _catalog;
}
function svcByKey(key) { return (_catalog?.services || []).find(s => s.key === key) || null; }

// ---- Guest draft store ----
function getGuestDraft() {
  try {
    const d = JSON.parse(localStorage.getItem(GUEST_DRAFT_KEY) || 'null');
    if (!d) return null;
    if (d.expiresAt && Date.now() > d.expiresAt) { localStorage.removeItem(GUEST_DRAFT_KEY); return null; }
    return d;
  } catch(e) { return null; }
}
function saveGuestDraft(patch) {
  const now = Date.now();
  const d = Object.assign(getGuestDraft() || {v:1, createdAt: now, status:'guest_draft', answers:{}}, patch);
  d.updatedAt = now;
  d.expiresAt = now + GUEST_DRAFT_TTL_MS;
  localStorage.setItem(GUEST_DRAFT_KEY, JSON.stringify(d));
  return d;
}
function clearGuestDraft() { localStorage.removeItem(GUEST_DRAFT_KEY); }
function guestDraftReady() { const d = getGuestDraft(); return !!(d && d.status === 'ready' && d.serviceKey); }

  if (desc.length < 10) {

// ---- Location picker (map pin + Photon address autosuggest + reverse geocode) ----
// Backend-proxied (CSP connect-src 'self'): suggestions hit /api/search/address-search,
// pin drops hit /api/search/reverse-geocode. Guayaquil is the default center.
let _gfMap = null, _gfMarker = null, _gfAddrTimer = null, _gfSuggestions = [];
const _GYE_CENTER = [-2.17, -79.90];

function gfInitLocationPicker() {
  const d = getGuestDraft() || {};
  const hasCoords = typeof d.lat === 'number' && typeof d.lng === 'number';
  const center = hasCoords ? [d.lat, d.lng] : _GYE_CENTER;
  // Marker is authoritative: whatever the pin sits on is the coordinate we send.
  // Seed the draft with the center so a request always carries coordinates
  // (which the server validates against the Guayaquil service area).
  if (!hasCoords) saveGuestDraft({lat: center[0], lng: center[1]});

  const el = document.getElementById('gf-map');
  if (!el || typeof L === 'undefined') { if (el) el.style.display = 'none'; return; }
  _gfMap = L.map('gf-map').setView(center, hasCoords ? 16 : 12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap', maxZoom: 19,
  }).addTo(_gfMap);
  _gfMarker = L.marker(center, { draggable: true }).addTo(_gfMap);
  _gfMarker.on('dragend', function() { const p = _gfMarker.getLatLng(); gfSetPin(p.lat, p.lng, true); });
  _gfMap.on('click', function(e) { gfSetPin(e.latlng.lat, e.latlng.lng, true); });
  // Leaflet miscalculates size in a freshly-inserted container; fix after paint.
  setTimeout(function() { if (_gfMap) _gfMap.invalidateSize(); }, 220);
  if (hasCoords) gfAreaCheck(center[0], center[1]);
}

// Move the pin, persist coords, optionally reverse-geocode to fill the address.
async function gfSetPin(lat, lng, doReverse) {
  if (_gfMarker) _gfMarker.setLatLng([lat, lng]);
  if (_gfMap) _gfMap.panTo([lat, lng]);
  saveGuestDraft({lat, lng});
  gfAreaCheck(lat, lng);
  if (doReverse) {
    try {
      const r = await api('GET', '/api/search/reverse-geocode?lat=' + lat + '&lng=' + lng);
      if (r && r.success && r.address) {
        const inp = document.getElementById('gf-address');
        if (inp) inp.value = r.address;
        saveGuestDraft({address: r.address});
      }
    } catch(e) { /* reverse geocode is best-effort */ }
  }
}

// Advisory coverage check — warns before submit if the pin is outside Guayaquil.
async function gfAreaCheck(lat, lng) {
  const warn = document.getElementById('gf-area-warn');
  if (!warn) return;
  try {
    const r = await api('POST', '/api/market/check-location', {latitude: lat, longitude: lng}, true);
    warn.innerHTML = (r && r.supported === false)
      ? alert_el('error', _t('guest.pinOutside')) : '';
  } catch(e) { warn.innerHTML = ''; }
}

function gfAddrInput() {
  const inp = document.getElementById('gf-address');
  if (inp) saveGuestDraft({address: inp.value});
  clearTimeout(_gfAddrTimer);
  _gfAddrTimer = setTimeout(gfRunAddrSearch, 450);   // debounce (Photon fair-use)
}

async function gfRunAddrSearch() {
  const inp = document.getElementById('gf-address');
  const box = document.getElementById('gf-addr-suggest');
  if (!inp || !box) return;
  const q = inp.value.trim();
  if (q.length < 3) { gfCloseSuggest(); return; }
  try {
    const results = await api('GET', '/api/search/address-search?q=' + encodeURIComponent(q));
    _gfSuggestions = Array.isArray(results) ? results : [];
    if (!_gfSuggestions.length) {
      box.innerHTML = '<div class="gf-suggest-empty">' + _t('guest.noSuggestions') + '</div>';
    } else {
      box.innerHTML = _gfSuggestions.map(function(s, i) {
        return '<button type="button" class="gf-suggest-item" role="option" onclick="gfPickSuggestion(' + i + ')">📍 ' + escapeHtml(s.label) + '</button>';
      }).join('');
    }
    box.hidden = false;
    inp.setAttribute('aria-expanded', 'true');
  } catch(e) { gfCloseSuggest(); }
}

function gfPickSuggestion(i) {
  const s = _gfSuggestions[i];
  if (!s) return;
  const inp = document.getElementById('gf-address');
  if (inp) inp.value = s.label;
  saveGuestDraft({address: s.label});
  gfCloseSuggest();
  if (_gfMap) _gfMap.setView([s.latitude, s.longitude], 16);
  gfSetPin(s.latitude, s.longitude, false);   // we already have a label
}

function gfCloseSuggest() {
  const box = document.getElementById('gf-addr-suggest');
  const inp = document.getElementById('gf-address');
  if (box) { box.hidden = true; box.innerHTML = ''; }
  if (inp) inp.setAttribute('aria-expanded', 'false');
}

function gfUseMyLocation() {
  const btn = document.getElementById('gf-loc-btn');
  const label = btn ? btn.querySelector('span') : null;
  if (!navigator.geolocation) { showToast(_t('guest.geoUnavailable'), 'error'); return; }
  if (label) label.textContent = _t('guest.locating');
  if (btn) btn.disabled = true;
  navigator.geolocation.getCurrentPosition(
    function(pos) {
      if (label) label.textContent = _t('guest.useMyLocation');
      if (btn) btn.disabled = false;
      if (_gfMap) _gfMap.setView([pos.coords.latitude, pos.coords.longitude], 16);
      gfSetPin(pos.coords.latitude, pos.coords.longitude, true);
    },
    function() {
      if (label) label.textContent = _t('guest.useMyLocation');
      if (btn) btn.disabled = false;
      showToast(_t('guest.geoUnavailable'), 'error');   // e.g. native client app (no location permission) or denied
    },
    { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
  );
}

async function submitCatalogRequest() {
  if (_submittingRequest) return;               // double-tap protection
  const d = getGuestDraft(); if (!d) return route('#/');
  const s = svcByKey(d.serviceKey); if (!s) return route('#/');
  const address = document.getElementById('gf-address').value.trim();
  const errEl = document.getElementById('gf-err');
  if (address.length < 3) {
    errEl.innerHTML = alert_el('error', _lang === 'es' ? 'Ingresa la dirección exacta del servicio.' : 'Enter the exact service address.');
    return;
  }
  const btn = document.getElementById('gf-submit');
  _submittingRequest = true;
  btn.disabled = true; btn.textContent = _t('guest.sending');
  const answers = Object.assign({}, d.answers, {_approx_area: d.sector + ', ' + d.city, _time_window: d.timeWindow || null});
  const payload = {
    service_key: d.serviceKey,
    title: svcName(s).slice(0, 300),
    description: d.description,
    location: address + ' — ' + d.sector + ', ' + d.city,
    urgency: d.urgency === 'asap' ? 'immediate' : 'scheduled',
    answers,
    // Structured location so the backend can authoritatively validate the
    // market. The server re-checks this and assigns market_code itself.
    city: d.city || _market.city,
    province: d.province || _market.province,
    country_code: 'EC',
    // Exact pin coordinates when the client set them — the server validates
    // these against the Guayaquil service area (coords take precedence over city).
    ...(typeof d.lat === 'number' && typeof d.lng === 'number' ? {latitude: d.lat, longitude: d.lng} : {}),
    ...(d.urgency === 'later' && d.date ? {scheduled_date: d.date + 'T09:00:00'} : {}),
    // No client budget: Lever sets the price server-side from the researched
    // Guayaquil labor rates (routes/client.py snapshots it onto the request).
  };
  try {
    const req = await post('/api/client/requests', payload);
    clearGuestDraft();
    showToast(_lang === 'es' ? 'Solicitud #' + req.id + ' enviada ✓' : 'Request #' + req.id + ' sent ✓', 'success');
    route('#/request/' + req.id);   // existing tracker = matching/status experience
  } catch(e) {
    // Map the backend's market errors to a clear, draft-preserving message.
    const outOfArea = /GUAYAQUIL|MARKET_NOT_ACTIVE|INVALID_LOCATION|SERVICE_NOT_AVAILABLE/i.test(e.message || '');
    errEl.innerHTML = alert_el('error', outOfArea ? _t('guest.outOfArea') : _t('guest.sendFailed'));
    btn.disabled = false; btn.textContent = _t('guest.send');
  } finally {
    _submittingRequest = false;
  }
}

function navDrawerKeydown(e) {
  if (e.key === 'Escape') { closeNavDrawer(); return; }
  if (e.key === 'Tab') { // simple focus trap
    var d = document.getElementById('nav-drawer');
    var f = d.querySelectorAll('button, a, [tabindex]:not([tabindex="-1"])');
    if (!f.length) return;
    var first = f[0], last = f[f.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }
}

// ============================================================
//  GPS LIVE TRACKING MODULE
// ============================================================

// --- Tracking state ---
let _trackingWs = null;          // WebSocket for tracking (provider or client)
let _trackingMap = null;         // Leaflet map instance
let _providerMarker = null;      // Provider location marker
let _destMarker = null;          // Destination marker
let _routeLine = null;           // Route polyline
let _trackingWatchId = null;     // Geolocation watchPosition ID
let _trackingJobId = null;       // Current tracking job ID
let _trackingBreadcrumbs = [];   // Trail points array

/**
 * Get WebSocket base URL from current location
 */
function wsBase() {
  if (IS_NATIVE) {
    return PROD_API_ORIGIN.replace(/^http/, 'ws');
  }
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  return proto + '//' + location.host;
}

// ─── PROVIDER: Start broadcasting GPS ───

function startProviderTracking(jobId) {
  if (_trackingWs) stopProviderTracking();
  _trackingJobId = jobId;

  const url = wsBase() + '/ws/tracking/' + jobId + '/provider';
  _trackingWs = new WebSocket(url);

  _trackingWs.onopen = function() {
    // Authenticate via first message (secure)
    _trackingWs.send(JSON.stringify({ type: 'auth', token: _token }));
    console.log('[Tracking] Provider WS connected for job', jobId);
    updateTrackingUI('broadcasting');

    // Start watching GPS
    if (navigator.geolocation) {
      _trackingWatchId = navigator.geolocation.watchPosition(
        function(pos) {
          if (_trackingWs && _trackingWs.readyState === WebSocket.OPEN) {
            _trackingWs.send(JSON.stringify({
              type: 'location',
              latitude: pos.coords.latitude,
              longitude: pos.coords.longitude,
              accuracy: pos.coords.accuracy,
              heading: pos.coords.heading,
              speed: pos.coords.speed,
              altitude: pos.coords.altitude,
              recorded_at: new Date().toISOString()
            }));
          }
        },
        function(err) {
          console.warn('[Tracking] GPS error:', err.message);
          const msg = err.code === err.PERMISSION_DENIED
            ? (_lang === 'es'
                ? 'Permiso de ubicación denegado. Actívalo en los ajustes del dispositivo para compartir tu ubicación.'
                : 'Location permission denied. Enable it in device settings to share your location.')
            : (_lang === 'es' ? 'Error de GPS: ' : 'GPS error: ') + err.message;
          showToast(msg, 'error');
          // Broadcasting without a location is misleading — stop cleanly
          // instead of leaving the UI stuck on "Starting GPS...".
          stopProviderTracking();
        },
        { enableHighAccuracy: true, maximumAge: 3000, timeout: 10000 }
      );
    } else {
      showToast(_lang === 'es' ? 'GPS no disponible en este dispositivo' : 'GPS not available on this device', 'error');
      stopProviderTracking();
    }
  };

  _trackingWs.onmessage = function(evt) {
    try {
      const msg = JSON.parse(evt.data);
      if (msg.type === 'location_ack') {
        updateProviderTrackingInfo(msg);
      }
    } catch(e) {}
  };

  _trackingWs.onclose = function() {
    console.log('[Tracking] Provider WS closed');
    cleanupProviderTracking();
  };

  _trackingWs.onerror = function(err) {
    console.error('[Tracking] Provider WS error:', err);
    cleanupProviderTracking();
  };
}

function stopProviderTracking() {
  if (_trackingWs && _trackingWs.readyState === WebSocket.OPEN) {
    _trackingWs.send(JSON.stringify({ type: 'tracking_stop' }));
    _trackingWs.close();
  }
  cleanupProviderTracking();
}

function cleanupProviderTracking() {
  if (_trackingWatchId !== null) {
    navigator.geolocation.clearWatch(_trackingWatchId);
    _trackingWatchId = null;
  }
  _trackingWs = null;
  _trackingJobId = null;
  updateTrackingUI('idle');
}

function updateProviderTrackingInfo(msg) {
  const infoEl = document.getElementById('tracking-info');
  if (!infoEl) return;
  let html = '<div class="text-sm" style="display:flex;gap:16px;flex-wrap:wrap;align-items:center">';
  html += '<span style="color:var(--success);font-weight:600"><span style="display:inline-block;width:8px;height:8px;background:var(--success);border-radius:50%;margin-right:4px;animation:pulse 1.5s infinite"></span> Broadcasting GPS</span>';
  if (msg.distance_miles != null) html += '<span>Distance: ' + msg.distance_miles.toFixed(1) + ' mi</span>';
  if (msg.eta_minutes != null) html += '<span>ETA: ' + Math.ceil(msg.eta_minutes) + ' min</span>';
  if (msg.watchers > 0) html += '<span>' + msg.watchers + ' watching</span>';
  html += '</div>';
  infoEl.innerHTML = html;
}

function updateTrackingUI(state) {
  const btnEl = document.getElementById('tracking-btn');
  const infoEl = document.getElementById('tracking-info');
  if (!btnEl) return;
  if (state === 'broadcasting') {
    btnEl.outerHTML = '<button id="tracking-btn" class="btn btn-danger" onclick="stopProviderTracking()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="2"/></svg> Stop Sharing Location</button>';
    if (infoEl) infoEl.innerHTML = '<div class="text-sm" style="color:var(--success)"><span style="display:inline-block;width:8px;height:8px;background:var(--success);border-radius:50%;margin-right:4px;animation:pulse 1.5s infinite"></span> Starting GPS...</div>';
  } else {
    btnEl.outerHTML = '<button id="tracking-btn" class="btn btn-primary" onclick="startProviderTracking(' + _trackingJobId + ')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16"/></svg> Share Live Location</button>';
    if (infoEl) infoEl.innerHTML = '';
  }
}


// ─── CLIENT: Watch provider location on map ───

function startClientTracking(jobId, destLat, destLng) {
  if (_trackingWs) stopClientTracking();
  _trackingJobId = jobId;
  _trackingBreadcrumbs = [];

  const url = wsBase() + '/ws/tracking/' + jobId + '/client';
  _trackingWs = new WebSocket(url);

  _trackingWs.onopen = function() {
    // Authenticate via first message (secure)
    _trackingWs.send(JSON.stringify({ type: 'auth', token: _token }));
    console.log('[Tracking] Client WS connected for job', jobId);
  };

  _trackingWs.onmessage = function(evt) {
    try {
      const msg = JSON.parse(evt.data);

      if (msg.type === 'tracking_started') {
        updateClientTrackingStatus(true);
      } else if (msg.type === 'tracking_stopped') {
        updateClientTrackingStatus(false);
      } else if (msg.type === 'location_update') {
        updateClientMap(msg, destLat, destLng);
        updateClientETA(msg);
      }
    } catch(e) {
      console.warn('[Tracking] Parse error:', e);
    }
  };

  _trackingWs.onclose = function() {
    console.log('[Tracking] Client WS closed');
  };

  // Keep-alive ping
  _trackingPing = setInterval(function() {
    if (_trackingWs && _trackingWs.readyState === WebSocket.OPEN) {
      _trackingWs.send(JSON.stringify({ type: 'ping' }));
    }
  }, 25000);
}

let _trackingPing = null;

function stopClientTracking() {
  if (_trackingWs) {
    _trackingWs.close();
    _trackingWs = null;
  }
  if (_trackingPing) {
    clearInterval(_trackingPing);
    _trackingPing = null;
  }
  _trackingJobId = null;
  _trackingBreadcrumbs = [];
}

function initTrackingMap(containerId, destLat, destLng) {
  const mapEl = document.getElementById(containerId);
  if (!mapEl || typeof L === 'undefined') return;

  const centerLat = destLat || 30.27;
  const centerLng = destLng || -97.74;

  _trackingMap = L.map(containerId).setView([centerLat, centerLng], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap',
    maxZoom: 19,
  }).addTo(_trackingMap);

  // Destination marker
  if (destLat && destLng) {
    _destMarker = L.marker([destLat, destLng], {
      icon: L.divIcon({
        className: 'tracking-dest-icon',
        html: '<div style="background:var(--brand);color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.3);font-size:14px">&#x1F4CD;</div>',
        iconSize: [32, 32],
        iconAnchor: [16, 32],
      })
    }).addTo(_trackingMap).bindPopup('<strong>Service Location</strong>');
  }

  // Route line
  _routeLine = L.polyline([], { color: '#6366f1', weight: 4, opacity: 0.7 }).addTo(_trackingMap);

  return _trackingMap;
}

function updateClientMap(msg, destLat, destLng) {
  if (!_trackingMap) return;

  const lat = msg.latitude;
  const lng = msg.longitude;
  _trackingBreadcrumbs.push([lat, lng]);

  // Update or create provider marker
  if (!_providerMarker) {
    _providerMarker = L.marker([lat, lng], {
      icon: L.divIcon({
        className: 'tracking-provider-icon',
        html: '<div style="background:#059669;color:white;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 12px rgba(5,150,105,.5);font-size:16px;border:3px solid white;animation:pulse 2s infinite">&#x1F6E0;</div>',
        iconSize: [36, 36],
        iconAnchor: [18, 18],
      })
    }).addTo(_trackingMap);
  } else {
    _providerMarker.setLatLng([lat, lng]);
  }

  // Update route trail
  _routeLine.setLatLngs(_trackingBreadcrumbs);

  // Fit map to show both markers
  if (destLat && destLng) {
    const bounds = L.latLngBounds([[lat, lng], [destLat, destLng]]);
    _trackingMap.fitBounds(bounds.pad(0.3));
  } else {
    _trackingMap.setView([lat, lng], 15);
  }
}

function updateClientETA(msg) {
  const etaEl = document.getElementById('tracking-eta-info');
  if (!etaEl) return;

  let html = '<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">';
  html += '<span style="color:var(--success);font-weight:600"><span style="display:inline-block;width:8px;height:8px;background:var(--success);border-radius:50%;margin-right:4px;animation:pulse 1.5s infinite"></span> Provider en route</span>';
  if (msg.eta_minutes != null) {
    const mins = Math.ceil(msg.eta_minutes);
    html += '<span style="font-size:1.1rem;font-weight:700;color:var(--brand)">' + mins + ' min away</span>';
  }
  if (msg.distance_miles != null) {
    html += '<span class="text-sm">' + msg.distance_miles.toFixed(1) + ' miles</span>';
  }
  if (msg.speed != null && msg.speed > 0) {
    const mph = (msg.speed * 2.237).toFixed(0);
    html += '<span class="text-sm">' + mph + ' mph</span>';
  }
  html += '</div>';
  etaEl.innerHTML = html;
}

function updateClientTrackingStatus(isTracking) {
  const statusEl = document.getElementById('tracking-status-badge');
  if (!statusEl) return;
  if (isTracking) {
    statusEl.innerHTML = '<span style="color:var(--success);font-weight:600"><span style="display:inline-block;width:8px;height:8px;background:var(--success);border-radius:50%;margin-right:6px;animation:pulse 1.5s infinite"></span> Live Tracking Active</span>';
  } else {
    statusEl.innerHTML = '<span class="text-sm" style="color:var(--gray-400)">Provider not broadcasting location</span>';
  }
}

/**
 * Render the client-side tracking card (injected into request detail)
 */
function renderClientTrackingCard(jobId, jobStatus, destLat, destLng) {
  const trackableStatuses = ['accepted', 'en_route', 'diagnosing', 'repairing', 'inspecting', 'servicing', 'working', 'assessing', 'prepping', 'washing'];
  if (!trackableStatuses.includes(jobStatus)) return '';

  return `
    <div class="card" id="tracking-card">
      <div class="card-header" style="margin-bottom:12px">
        <div class="card-title" style="display:flex;align-items:center;gap:8px">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
          Live Tracking
        </div>
        <div id="tracking-status-badge">
          <span class="text-sm" style="color:var(--gray-400)">Connecting...</span>
        </div>
      </div>
      <div id="tracking-eta-info" style="margin-bottom:12px"></div>
      <div id="tracking-map-container" style="height:350px;border-radius:12px;overflow:hidden;background:var(--gray-100)"></div>
    </div>`;
}

/**
 * Render the provider-side tracking controls (injected into job detail)
 */
function renderProviderTrackingControls(jobId, jobStatus) {
  const trackableStatuses = ['accepted', 'en_route', 'diagnosing', 'repairing', 'inspecting', 'servicing', 'working', 'assessing', 'prepping', 'washing'];
  if (!trackableStatuses.includes(jobStatus)) return '';

  return `
    <div class="card" id="provider-tracking-card">
      <div class="card-title" style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--brand)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>
        Live Location Sharing
      </div>
      <p class="text-sm" style="color:var(--gray-500);margin-bottom:12px">Share your real-time location with the client so they can track your arrival.</p>
      <div id="tracking-info" style="margin-bottom:12px"></div>
      <button id="tracking-btn" class="btn btn-primary" onclick="startProviderTracking(${jobId})">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16"/></svg>
        Share Live Location
      </button>
    </div>`;
}
