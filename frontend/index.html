<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Lever — Servicios Profesionales</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lever">
<link rel="apple-touch-icon" href="/icons/icon-192x192.png">
<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
/* Primary Indigo + Black (Lever) */
--brand-50:#eef2ff;--brand-100:#e0e7ff;--brand-200:#c7d2fe;--brand-300:#a5b4fc;
--brand-400:#818cf8;--brand:#6366f1;--brand-dark:#4f46e5;--brand-900:#0a0a0a;
--brand-light:#e0e7ff;
/* Accent: Warm Amber (CTA / highlights) */
--accent:#f59e0b;--accent-light:#fef3c7;--accent-dark:#d97706;
/* Accent: Teal (secondary actions / positive) */
--teal:#0d9488;--teal-light:#ccfbf1;--teal-dark:#0f766e;
/* Accent: Coral (urgency / notifications) */
--coral:#f43f5e;--coral-light:#ffe4e6;
/* Semantic */
--success:#059669;--success-light:#d1fae5;--warn:#d97706;--warn-light:#fef3c7;
--danger:#dc2626;--danger-light:#fee2e2;
/* Neutrals */
--gray-50:#f8fafc;--gray-100:#f1f5f9;--gray-200:#e2e8f0;--gray-300:#cbd5e1;
--gray-400:#94a3b8;--gray-500:#64748b;--gray-600:#475569;--gray-700:#334155;
--gray-800:#1e293b;--gray-900:#0f172a;
/* Elevation & Shape */
--radius:10px;--radius-lg:16px;--radius-full:9999px;
--shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.06);
--shadow-md:0 4px 6px rgba(0,0,0,.07),0 2px 4px rgba(0,0,0,.06);
--shadow-lg:0 10px 25px rgba(0,0,0,.1),0 4px 10px rgba(0,0,0,.06);
/* Transitions */
--ease:cubic-bezier(.4,0,.2,1);--duration:.2s;
/* Customer app shell tokens (floating bottom nav + home header) */
--bottom-nav-height:64px;--bottom-nav-gap:12px;
--content-bottom-pad:calc(var(--bottom-nav-height) + 32px + env(safe-area-inset-bottom,0px));
--nav-green:#0d9488;--nav-green-soft:#ccfbf1;
}
html{-webkit-text-size-adjust:100%;-moz-text-size-adjust:100%;text-size-adjust:100%}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#fff;color:var(--gray-900);min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--brand);text-decoration:none}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit}

/* ---- Global Enhancements ---- */
::selection{background:var(--brand-200);color:var(--brand-900)}
:focus-visible{outline:2px solid var(--brand-400);outline-offset:2px}
.btn-primary{background:var(--brand);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius);font-weight:600;font-size:.9rem;cursor:pointer;transition:all var(--duration) var(--ease);box-shadow:0 1px 3px rgba(99,102,241,.3)}
.btn-primary:hover{background:var(--brand-dark);box-shadow:0 4px 12px rgba(99,102,241,.35);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-accent{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius);font-weight:600;font-size:.9rem;cursor:pointer;transition:all var(--duration) var(--ease)}
.btn-accent:hover{background:var(--accent-dark);transform:translateY(-1px)}
.badge-new{background:var(--coral);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:var(--radius-full);font-weight:600}
.badge-pro{background:var(--teal);color:#fff;font-size:.7rem;padding:2px 8px;border-radius:var(--radius-full);font-weight:600}
.text-brand{color:var(--brand)}
.text-accent{color:var(--accent)}
.text-teal{color:var(--teal)}
.bg-brand-50{background:var(--brand-50)}
.bg-accent-light{background:var(--accent-light)}
/* ---- Layout ---- */
#app{display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;color:var(--gray-900);padding:env(safe-area-inset-top,0px) 24px 0;min-height:calc(60px + env(safe-area-inset-top,0px));display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-200);position:sticky;top:0;z-index:100}
.topbar-brand{font-weight:700;font-size:1.2rem;letter-spacing:-.5px}
.topbar-brand span{color:var(--gray-500);font-size:.85rem;margin-left:6px}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-user{font-size:.85rem;color:var(--gray-600)}
.btn-sm{padding:6px 14px;border-radius:var(--radius);border:1px solid var(--brand-200);font-size:.8rem;font-weight:600;background:#fff;color:var(--brand);transition:all var(--duration) var(--ease)}
.btn-sm:hover{background:var(--brand-50)}
.provider-status-toggle{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:var(--radius-full);border:1px solid var(--gray-300);font-size:.8rem;font-weight:600;background:var(--gray-100);color:var(--gray-600);transition:all var(--duration) var(--ease)}
.provider-status-toggle .status-dot{width:8px;height:8px;border-radius:50%;background:var(--gray-400)}
.provider-status-toggle.is-online{border-color:var(--success);background:var(--success-light);color:var(--success)}
.provider-status-toggle.is-online .status-dot{background:var(--success)}
.provider-status-toggle:disabled{opacity:.6;cursor:not-allowed}

.main-wrap{display:flex;flex:1}
.sidebar{width:240px;background:#fff;border-right:1px solid var(--gray-200);padding:16px 0;flex-shrink:0}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:.9rem;color:var(--gray-700);cursor:pointer;transition:.12s}
.sidebar-item:hover{background:var(--brand-50);color:var(--brand);border-radius:0 var(--radius) var(--radius) 0}
.sidebar-item.active{background:var(--brand-100);color:var(--brand);font-weight:600;border-left:3px solid var(--brand);border-radius:0 var(--radius) var(--radius) 0}
.sidebar-icon{font-size:1.1rem;width:22px;text-align:center}
.content{flex:1;padding:24px;overflow-y:auto}

/* ---- Verification Screen ---- */
.verify-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff}
.verify-card{background:#fff;border-radius:var(--radius-lg);padding:40px;width:100%;max-width:480px;box-shadow:var(--shadow-lg);text-align:center;border:1px solid var(--gray-100)}
.verify-icon{font-size:3rem;margin-bottom:16px}
.verify-title{font-size:1.4rem;font-weight:700;color:var(--gray-900);margin-bottom:8px}
.verify-subtitle{font-size:.9rem;color:var(--gray-600);margin-bottom:28px;line-height:1.5}
.verify-email-highlight{font-weight:600;color:var(--brand)}
.code-inputs{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.code-inputs input{width:48px;height:56px;text-align:center;font-size:1.5rem;font-weight:700;border:2px solid var(--gray-200);border-radius:var(--radius);transition:.15s;color:var(--gray-900)}
.code-inputs input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
.code-inputs input.error{border-color:var(--danger);animation:shake .4s}
.code-inputs input.success{border-color:var(--success);background:#f0fdf4}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-4px)}40%,80%{transform:translateX(4px)}}
.verify-actions{display:flex;flex-direction:column;gap:12px;align-items:center}
.verify-resend{font-size:.85rem;color:var(--gray-600);background:none;border:none;cursor:pointer;padding:4px 8px}
.verify-resend:not(:disabled):hover{color:var(--brand)}
.verify-resend:disabled{opacity:.5;cursor:not-allowed}
.verify-timer{font-size:.8rem;color:var(--gray-400);margin-top:4px}
.verify-footer{margin-top:24px;padding-top:16px;border-top:1px solid var(--gray-200);font-size:.8rem;color:var(--gray-400)}
.verify-logout{color:var(--brand);cursor:pointer;background:none;border:none;font-size:.8rem;font-weight:600}
.verify-banner{background:var(--warn);color:#fff;padding:8px 16px;font-size:.82rem;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px}
.verify-banner button{background:rgba(255,255,255,.25);border:none;color:#fff;padding:4px 12px;border-radius:4px;font-size:.78rem;font-weight:600;cursor:pointer}
.verify-banner button:hover{background:rgba(255,255,255,.4)}

/* ---- Auth screens ---- */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#fff}
.auth-card{background:#fff;border-radius:var(--radius-lg);padding:40px;width:100%;max-width:440px;box-shadow:var(--shadow-lg);border:1px solid var(--gray-100)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo h1{color:var(--brand);font-size:1.8rem;font-weight:800}
.auth-logo p{color:var(--gray-600);font-size:.9rem;margin-top:4px}
.tab-row{display:flex;margin-bottom:24px;border-bottom:2px solid var(--gray-200)}
.tab-btn{flex:1;padding:10px;background:none;border:none;font-size:.9rem;color:var(--gray-600);font-weight:500;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.15s}
.tab-btn.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}

/* ---- Form controls ---- */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.8rem;font-weight:600;color:var(--gray-700);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-200);border-radius:var(--radius);font-size:.95rem;transition:.15s;background:#fff}
.dob-help{margin-top:6px;font-size:.76rem;color:var(--gray-500);line-height:1.45}
/* In-app legal document viewer (native) */
.legal-body{font-size:.9rem;line-height:1.65;color:var(--gray-800);padding:4px 2px 16px;word-wrap:break-word}
.legal-body h1,.legal-body h2,.legal-body h3{margin:18px 0 8px;line-height:1.3}
.legal-body p,.legal-body li{margin-bottom:8px}
.legal-body ul,.legal-body ol{padding-left:20px}
.legal-body a{color:var(--brand)}
.legal-body table{width:100%;overflow-x:auto;display:block;font-size:.82rem}
/* Branded Lever loading spinner (the L stays still, the ring spins) */
.lever-spinner{display:inline-flex}
.lever-spinner svg{animation:leverPulse 1.8s ease-in-out infinite;border-radius:12px;box-shadow:0 4px 14px rgba(99,102,241,.28)}
.lever-spinner-ring{transform-origin:50px 50px;animation:leverSpin 1.1s linear infinite}
@keyframes leverSpin{to{transform:rotate(360deg)}}
@keyframes leverPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
@media(prefers-reduced-motion:reduce){.lever-spinner svg,.lever-spinner-ring{animation:none}}
/* Provider multi-profession service selection */
.psvc-search{width:100%;height:44px;padding:0 14px;border:1.5px solid var(--gray-200);border-radius:12px;font-size:16px;background:var(--gray-50);margin-bottom:10px}
.psvc-search:focus{outline:none;border-color:var(--nav-green);background:#fff}
.psvc-count{font-size:.82rem;font-weight:600;color:var(--nav-green);margin-bottom:10px}
.psvc-empty{padding:16px 4px;color:var(--gray-500);font-size:.86rem}
.psvc-group{border:1px solid var(--gray-200);border-radius:12px;margin-bottom:8px;overflow:hidden}
.psvc-group-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;cursor:pointer;font-weight:700;font-size:.9rem;color:var(--gray-800);list-style:none}
.psvc-group-head::-webkit-details-marker{display:none}
.psvc-group[open] .psvc-group-head{border-bottom:1px solid var(--gray-100);background:var(--gray-50)}
.psvc-group-n{font-size:.76rem;font-weight:700;color:var(--nav-green);background:var(--nav-green-soft);border-radius:999px;padding:2px 9px}
.psvc-group-body{padding:0 14px}
/* Password field with show/hide eye toggle */
.pass-wrap{position:relative}
.pass-wrap input{padding-right:44px}
.pass-eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:none;border:none;padding:8px;cursor:pointer;color:var(--gray-400);display:flex;align-items:center;justify-content:center;border-radius:8px;min-width:36px;min-height:36px}
.pass-eye:hover{color:var(--gray-600)}
.pass-eye:focus-visible{outline:2px solid var(--brand);outline-offset:-2px}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(129,140,248,.14)}
.form-group textarea{min-height:90px;resize:vertical}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ---- Buttons ---- */
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;border-radius:var(--radius);border:none;font-size:.9rem;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary{background:var(--brand);color:#fff}.btn-primary:hover{background:var(--brand-dark)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{filter:brightness(.9)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{filter:brightness(.9)}
.btn-outline{background:transparent;border:1.5px solid var(--gray-200);color:var(--gray-700)}.btn-outline:hover{background:var(--gray-100)}
.btn-ghost{background:transparent;color:var(--brand);padding:6px 10px}.btn-ghost:hover{background:var(--brand-light)}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* ---- Cards ---- */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.card-title{font-size:1rem;font-weight:700;color:var(--gray-900)}
.card-subtitle{font-size:.82rem;color:var(--gray-600);margin-top:2px}

/* ---- Worker Selection Panel ---- */
.worker-panel{margin-top:12px;display:none}
.worker-panel.visible{display:block}
.worker-list{display:flex;flex-direction:column;gap:8px;max-height:250px;overflow-y:auto;margin-top:8px}
.worker-card{display:flex;align-items:center;gap:12px;padding:12px;border:2px solid var(--gray-200);border-radius:var(--radius);cursor:pointer;transition:all .15s}
.worker-card:hover{border-color:var(--brand);background:var(--brand-light)}
.worker-card.selected{border-color:var(--brand);background:var(--brand-light);box-shadow:0 0 0 2px var(--brand)}
.worker-avatar{width:44px;height:44px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:700;color:var(--brand)}
.worker-info{flex:1}
.worker-name{font-weight:600;font-size:.9rem}
.worker-meta{font-size:.8rem;color:var(--gray-600);margin-top:2px}
.worker-rating{color:#f59e0b;font-weight:600}
.worker-search-msg{text-align:center;padding:20px;color:var(--gray-500);font-size:.85rem}

/* ---- Stats grid ---- */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;text-align:center}
.stat-num{font-size:2rem;font-weight:800;color:var(--brand)}
.stat-label{font-size:.78rem;color:var(--gray-600);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}

/* ---- Table ---- */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{text-align:left;padding:10px 12px;background:var(--gray-50);color:var(--gray-600);font-weight:600;font-size:.78rem;text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--gray-200)}
td{padding:10px 12px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--gray-50)}

/* ---- Badges ---- */
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.74rem;font-weight:600;white-space:nowrap}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-assigned{background:#dbeafe;color:#1e40af}
.badge-in_progress,.badge-repairing,.badge-diagnosing,.badge-en_route{background:#e0e7ff;color:#3730a3}
.badge-inspecting,.badge-servicing,.badge-working,.badge-assessing,.badge-prepping,.badge-washing{background:#e0e7ff;color:#3730a3}
.badge-accepted{background:#d1fae5;color:#065f46}
.badge-completed{background:#dcfce7;color:#166534}
.badge-cancelled{background:var(--gray-100);color:var(--gray-600)}
.badge-open{background:#fee2e2;color:#991b1b}
.badge-reviewing{background:#fef3c7;color:#92400e}
.badge-resolved{background:#dcfce7;color:#166534}
.badge-immediate{background:#fee2e2;color:#991b1b}
.badge-scheduled{background:#e0e7ff;color:#3730a3}
.badge-client{background:#dbeafe;color:#1e40af}
.badge-mechanic{background:#d1fae5;color:#065f46}
.badge-admin{background:#f3e8ff;color:#6b21a8}

/* Profession badges */
.badge-prof{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.76rem;font-weight:600}
.badge-prof-home_cleaning{background:#e0f2fe;color:#075985}
.badge-prof-handyman{background:#fef3c7;color:#92400e}
.badge-prof-plumbing{background:#dbeafe;color:#1e40af}
.badge-prof-electrical{background:#fef9c3;color:#854d0e}
.badge-prof-painting{background:#fae8ff;color:#86198f}
.badge-prof-construction{background:#fed7aa;color:#9a3412}
.badge-prof-gardening{background:#dcfce7;color:#166534}
.badge-prof-appliance_repair{background:#cffafe;color:#155e75}
.badge-prof-tech_support{background:#e0e7ff;color:#3730a3}
.badge-prof-beauty{background:#fce7f3;color:#9d174d}
.badge-prof-automotive{background:#d1fae5;color:#065f46}
.badge-prof-moving{background:#f3e8ff;color:#6b21a8}
.badge-prof-home_security{background:#e2e8f0;color:#1e293b}
.badge-prof-pets{background:#ffedd5;color:#9a3412}
.badge-prof-events{background:#ffe4e6;color:#9f1239}
.badge-prof-business_support{background:#e0f2fe;color:#0c4a6e}
/* ── Guest flow / service catalog (Phase 2) ── */
.gpage{max-width:640px;margin:0 auto;padding:calc(16px + env(safe-area-inset-top,0px)) 16px 96px;min-height:100vh;background:#fff}
.ghead{display:flex;align-items:center;gap:10px;padding:8px 0 16px}
.ghead .gback{border:none;background:var(--gray-100);border-radius:10px;width:38px;height:38px;font-size:1.1rem;cursor:pointer;flex-shrink:0}
.ghead .gtitle{font-weight:800;font-size:1.05rem;flex:1;letter-spacing:-.3px}
.ghead .glogin{font-size:.85rem;color:var(--brand);background:none;border:none;font-weight:700;cursor:pointer;padding:8px}
.gsearch{display:flex;align-items:center;gap:8px;background:var(--gray-100);border-radius:12px;padding:12px 14px;margin-bottom:18px}
.gsearch input{flex:1;border:none;background:transparent;font-size:1rem;outline:none;color:var(--gray-900)}
.gcat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
.gcat-card{display:flex;flex-direction:column;align-items:center;gap:6px;background:#fff;border:1px solid var(--gray-200);border-radius:14px;padding:14px 6px;cursor:pointer;text-align:center;transition:.12s;min-height:88px;justify-content:center}
.gcat-card:hover{border-color:var(--brand);box-shadow:0 2px 8px rgba(99,102,241,.12)}
.gcat-card .gc-icon{font-size:1.6rem;line-height:1}
.gcat-card .gc-name{font-size:.72rem;font-weight:600;color:var(--gray-700);line-height:1.2}
.gsvc-row{display:flex;align-items:center;gap:12px;padding:14px 4px;border-bottom:1px solid var(--gray-100);cursor:pointer}
.gsvc-row:hover{background:var(--gray-50)}
.gsvc-row .gs-icon{font-size:1.3rem;flex-shrink:0}
.gsvc-row .gs-body{flex:1;min-width:0}
.gsvc-row .gs-name{font-weight:600;font-size:.92rem;color:var(--gray-900)}
.gsvc-row .gs-desc{font-size:.78rem;color:var(--gray-500);margin-top:2px}
.gsvc-row .gs-arrow{color:var(--gray-300);flex-shrink:0}
.gnotice{background:var(--brand-50);border:1px solid var(--brand-100);color:var(--gray-700);border-radius:12px;padding:10px 14px;font-size:.8rem;margin:14px 0}
.gprogress{display:flex;gap:6px;margin:4px 0 18px}
.gprogress span{flex:1;height:4px;border-radius:2px;background:var(--gray-200)}
.gprogress span.done{background:var(--brand)}
.gchip-row{display:flex;flex-wrap:wrap;gap:8px}
.gchip{border:1.5px solid var(--gray-200);background:#fff;border-radius:999px;padding:10px 16px;font-size:.88rem;cursor:pointer;color:var(--gray-700);min-height:44px}
.gchip.sel{border-color:var(--brand);background:var(--brand-50);color:var(--brand);font-weight:700}
.gsum-row{display:flex;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--gray-100);font-size:.9rem}
.gsum-row .k{color:var(--gray-500)}
.gsum-row .v{font-weight:600;text-align:right;max-width:60%;word-break:break-word}
.gsum-row .e{color:var(--brand);font-size:.8rem;font-weight:700;cursor:pointer;background:none;border:none;flex-shrink:0}

/* ---- Waiting for Assignment Animation ---- */
.waiting-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: #fff;
  z-index: 10000; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  animation: waitingFadeIn 0.5s ease-out;
}
@keyframes waitingFadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes waitingFadeOut { from { opacity: 1; } to { opacity: 0; transform: scale(1.05); } }
.waiting-icon-ring {
  width: 120px; height: 120px; border-radius: 50%;
  border: 4px solid var(--gray-200); border-top-color: var(--brand);
  animation: waitingSpin 1s linear infinite;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 32px; position: relative;
}
@keyframes waitingSpin { to { transform: rotate(360deg); } }
.waiting-icon-inner { font-size: 48px; animation: waitingPulse 2s ease-in-out infinite; }
@keyframes waitingPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.8; } }
.waiting-title { color: var(--gray-900); font-size: 24px; font-weight: 700; margin-bottom: 12px; text-align: center; }
.waiting-subtitle { color: var(--gray-600); font-size: 16px; margin-bottom: 40px; text-align: center; max-width: 400px; line-height: 1.5; }
.waiting-steps { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 360px; }
.waiting-step { display: flex; align-items: center; gap: 14px; color: var(--gray-400); font-size: 15px; transition: all 0.5s ease; }
.waiting-step.active { color: var(--gray-900); font-weight: 600; }
.waiting-step.done { color: var(--gray-600); }
.waiting-step-icon { width: 32px; height: 32px; border-radius: 50%; background: var(--gray-100); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; transition: all 0.5s ease; }
.waiting-step.active .waiting-step-icon { background: var(--brand-100); animation: stepPulse 1.5s ease-in-out infinite; }
.waiting-step.done .waiting-step-icon { background: var(--success-light); }
@keyframes stepPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,0.3); } 50% { box-shadow: 0 0 0 8px rgba(99,102,241,0); } }
.waiting-progress-bar { width: 100%; max-width: 360px; height: 4px; background: var(--gray-200); border-radius: 4px; margin-top: 32px; overflow: hidden; }
.waiting-progress-fill { height: 100%; background: var(--brand); border-radius: 4px; width: 0%; transition: width 0.8s ease; }
.waiting-dots { display: inline-flex; gap: 4px; margin-left: 4px; }
.waiting-dots span { width: 4px; height: 4px; background: currentColor; border-radius: 50%; animation: dotBounce 1.4s ease-in-out infinite; }
.waiting-dots span:nth-child(2) { animation-delay: 0.2s; }
.waiting-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dotBounce { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }


/* ---- Categorized Profession Dropdown ---- */
.prof-dropdown-wrap { position: relative; }
.prof-dropdown-trigger {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 16px; border: 1.5px solid var(--gray-200);
  border-radius: 12px; background: #fff; cursor: pointer;
  transition: all 0.2s ease; font-size: 15px; color: var(--gray-900);
  min-height: 48px;
}
.prof-dropdown-trigger:hover { border-color: var(--primary); }
.prof-dropdown-trigger.open { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(102,126,234,0.15); }
.prof-dropdown-trigger .prof-dd-icon { font-size: 22px; flex-shrink: 0; }
.prof-dropdown-trigger .prof-dd-label { flex: 1; font-weight: 500; }
.prof-dropdown-trigger .prof-dd-arrow {
  width: 20px; height: 20px; transition: transform 0.2s;
  color: var(--gray-400);
}
.prof-dropdown-trigger.open .prof-dd-arrow { transform: rotate(180deg); }

.prof-dropdown-menu {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: #fff; border: 1px solid var(--gray-200);
  border-radius: 14px; box-shadow: 0 12px 40px rgba(0,0,0,0.12);
  z-index: 1000; max-height: 380px; overflow-y: auto;
  opacity: 0; transform: translateY(-8px); pointer-events: none;
  transition: all 0.2s ease;
}
.prof-dropdown-menu.show {
  opacity: 1; transform: translateY(0); pointer-events: all;
}
.prof-dropdown-menu::-webkit-scrollbar { width: 6px; }
.prof-dropdown-menu::-webkit-scrollbar-thumb { background: var(--gray-300); border-radius: 3px; }

.prof-dd-search {
  position: sticky; top: 0; padding: 10px 14px;
  background: #fff; border-bottom: 1px solid var(--gray-100); z-index: 1;

.offer-popup{position:fixed;left:12px;right:12px;bottom:calc(var(--bottom-nav-height) + var(--bottom-nav-gap) + 12px + env(safe-area-inset-bottom,0px));z-index:400;background:#fff;border:1px solid var(--gray-200);border-radius:20px;padding:16px;box-shadow:0 12px 40px rgba(15,23,42,.25);max-width:560px;margin:0 auto;animation:offerUp .28s var(--ease)}
@keyframes offerUp{from{transform:translateY(24px);opacity:0}to{transform:translateY(0);opacity:1}}
.offer-head{display:flex;align-items:center;gap:8px;color:var(--nav-green);font-size:.95rem;margin-bottom:8px}
.offer-bolt{animation:tabPingBolt 1.2s ease-in-out infinite}
@keyframes tabPingBolt{0%,100%{transform:scale(1)}50%{transform:scale(1.25)}}
.offer-close{margin-left:auto;border:none;background:none;color:var(--gray-400);font-size:1rem;cursor:pointer;padding:6px;min-width:32px;min-height:32px}
.offer-title{font-weight:800;font-size:1.05rem;color:var(--gray-900);margin-bottom:6px}
.offer-pay{font-size:.92rem;color:var(--gray-800)}
.offer-keep{font-size:.76rem;color:var(--nav-green);font-weight:600;margin:2px 0 10px}
.offer-timer-track{height:6px;border-radius:3px;background:var(--gray-100);overflow:hidden}
.offer-timer-fill{height:100%;width:100%;border-radius:3px;background:linear-gradient(90deg,var(--coral),var(--accent));transition:width .2s linear}
.offer-timer-text{font-size:.76rem;color:var(--gray-500);margin:6px 0 12px}
.offer-accept{width:100%;padding:14px;border:none;border-radius:14px;background:var(--success);color:#fff;font-size:1rem;font-weight:800;cursor:pointer;min-height:50px}
@media(prefers-reduced-motion:reduce){.tab-ping::before,.offer-bolt,.offer-popup{animation:none}}
.tab-item.active{color:var(--nav-green)}
.tab-item.active .tab-icon{transform:translateY(-1px) scale(1.05)}
.tab-item:focus-visible{outline:2px solid var(--nav-green);outline-offset:-3px}
.tab-item:active{background:var(--gray-50)}
.tab-item .tab-dot{display:none;position:absolute;top:4px;right:12px;width:6px;height:6px;background:var(--coral);border-radius:50%}
.tab-item .tab-dot.visible{display:block}
.topbar-bell{position:relative;cursor:pointer;font-size:1.15rem;width:38px;height:38px;display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:10px;background:none;color:var(--gray-600);-webkit-tap-highlight-color:transparent}
.topbar-bell:hover{background:var(--gray-100)}
.topbar-bell .bell-count{position:absolute;top:2px;right:2px;background:var(--coral);color:#fff;font-size:.6rem;font-weight:700;min-width:15px;height:15px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.topbar-bell .bell-count:empty{display:none}
/* Sign-out + role label sized to line up with the bell (38px) */
.topbar-signout{display:inline-flex;align-items:center;justify-content:center;height:38px;padding:0 14px;border:1px solid var(--gray-200);border-radius:10px;background:#fff;color:var(--gray-600);font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap}
.topbar-signout:hover{background:var(--gray-50);color:var(--danger);border-color:var(--danger-light)}
.topbar-role{color:var(--gray-400);font-size:.8rem;font-weight:600;text-transform:capitalize}
/* ===== Customer Home: floating header (Lever wordmark + service search) ===== */
#app-shell.route-home .topbar{display:none}
#app-shell.route-home .content{padding:0}
.home-header{position:sticky;top:0;z-index:60;margin:calc(env(safe-area-inset-top,0px) + 10px) auto 4px;padding:16px 16px 14px;background:#fff;border:1px solid var(--gray-200);border-radius:20px;box-shadow:0 6px 22px rgba(15,23,42,.10),0 2px 6px rgba(15,23,42,.05);max-width:600px;width:calc(100% - 24px)}
.home-wordmark{font-weight:800;font-size:1.4rem;letter-spacing:-.5px;color:var(--gray-900);margin-bottom:12px}
.home-search{position:relative}
.home-search-icon{position:absolute;left:14px;top:24px;transform:translateY(-50%);color:var(--gray-400);pointer-events:none;display:flex}
.home-search input{width:100%;height:48px;padding:0 14px 0 42px;border:1.5px solid var(--gray-200);border-radius:14px;font-size:16px;background:var(--gray-50);color:var(--gray-900);transition:border-color .15s,background .15s}
.home-search input:focus{outline:none;border-color:var(--nav-green);background:#fff;box-shadow:0 0 0 3px var(--nav-green-soft)}
.home-suggest{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:70;background:#fff;border:1px solid var(--gray-200);border-radius:14px;box-shadow:var(--shadow-lg);max-height:300px;overflow-y:auto}
.home-suggest-item{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:11px 14px;border:none;background:none;font-size:.9rem;color:var(--gray-800);cursor:pointer;border-bottom:1px solid var(--gray-100)}
.home-suggest-item:hover,.home-suggest-item:focus{background:var(--gray-50);outline:none}
.home-suggest-viewall{color:var(--nav-green);font-weight:700}
.home-suggest-empty{padding:12px 14px;font-size:.85rem;color:var(--gray-500)}
.home-body{padding:14px 16px var(--content-bottom-pad);max-width:600px;margin:0 auto}
.home-greeting{font-size:1.05rem;font-weight:700;color:var(--gray-900);margin-bottom:6px}
.home-avail{display:inline-flex;align-items:center;gap:6px;font-size:.8rem;font-weight:600;color:var(--nav-green);background:var(--nav-green-soft);border-radius:999px;padding:4px 12px;margin-bottom:16px}
.home-cta{display:block;width:100%;padding:15px;border:none;border-radius:14px;background:var(--brand);color:#fff;font-size:1rem;font-weight:700;cursor:pointer;min-height:52px;margin-bottom:18px}
.home-draft{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:14px;border:1px solid var(--accent);background:var(--accent-light);border-radius:14px;color:var(--gray-800);font-size:.9rem;font-weight:600;cursor:pointer;margin-bottom:18px}
.home-section-title{font-size:.95rem;font-weight:700;color:var(--gray-800);margin:0 0 12px}
.home-cats{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px}
.home-cat{display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 8px;border:1px solid var(--gray-200);border-radius:14px;background:#fff;cursor:pointer;text-align:center}
.home-cat:hover{border-color:var(--nav-green);background:var(--gray-50)}
.home-cat-icon{font-size:1.6rem;line-height:1}
.home-cat-name{font-size:.72rem;font-weight:600;color:var(--gray-700);line-height:1.2}
/* ===== Activity: status filter chips + mobile-friendly cards ===== */
.act-chips{display:flex;gap:8px;overflow-x:auto;padding:4px 0 14px;-webkit-overflow-scrolling:touch}
.act-chip{flex-shrink:0;border:1.5px solid var(--gray-200);background:#fff;border-radius:999px;padding:7px 14px;font-size:.82rem;font-weight:600;color:var(--gray-600);cursor:pointer;white-space:nowrap;min-height:36px}
.act-chip.active{background:var(--nav-green);border-color:var(--nav-green);color:#fff}
.act-chip-n{opacity:.85;font-size:.75rem}
.act-list{display:flex;flex-direction:column;gap:10px}
.act-card{display:block;width:100%;text-align:left;background:#fff;border:1px solid var(--gray-200);border-radius:14px;padding:14px;cursor:pointer}
.act-card:hover{border-color:var(--nav-green)}
.act-card:focus-visible{outline:2px solid var(--nav-green);outline-offset:2px}
.act-card-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:6px}
.act-card-title{font-weight:700;font-size:.95rem;color:var(--gray-900)}
.act-card-meta{font-size:.8rem;color:var(--gray-500);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.act-card-price{font-size:.82rem;color:var(--gray-700);font-weight:600;margin-top:6px}
.act-card-cta{margin-top:8px;font-size:.8rem;font-weight:700;color:var(--nav-green)}
.act-card-done{margin-top:8px;font-size:.8rem;font-weight:600;color:var(--gray-500)}
.act-card-pro{margin-top:6px;font-size:.82rem;color:var(--gray-700);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.act-verif{color:var(--nav-green);font-weight:700}
.act-none{text-align:center;padding:28px 16px;color:var(--gray-500);font-size:.88rem}
/* ===== Account: identity + reputation + grouped rows ===== */
.acct-wrap{max-width:600px;margin:0 auto}
.acct-identity{display:flex;align-items:flex-start;gap:14px;padding:18px;background:#fff;border:1px solid var(--gray-200);border-radius:16px;margin-bottom:18px}
.acct-avatar{width:60px;height:60px;border-radius:50%;background:var(--brand-light);color:var(--brand);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;flex-shrink:0;overflow:hidden}
.acct-avatar img{width:100%;height:100%;object-fit:cover}
.acct-identity-info{flex:1;min-width:0}
.acct-name{font-size:1.35rem;font-weight:800;color:var(--gray-900);line-height:1.2;letter-spacing:-.3px;word-break:break-word;margin:0}
.acct-rating{display:inline-flex;align-items:center;gap:6px;margin-top:5px;font-size:.9rem;color:var(--gray-700)}
.acct-rating .star{color:#f59e0b;font-size:1rem}
.acct-rating-none{margin-top:5px;font-size:.82rem;color:var(--gray-500);line-height:1.4}
.acct-meta{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
.acct-chip{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:999px;background:var(--gray-100);color:var(--gray-600)}
.acct-chip.verified{background:var(--nav-green-soft);color:var(--nav-green)}
.acct-edit{flex-shrink:0;padding:7px 12px;border:1px solid var(--gray-200);border-radius:10px;background:#fff;color:var(--brand);font-size:.8rem;font-weight:600;cursor:pointer}
.acct-group{margin-bottom:16px}
.acct-group-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--gray-400);margin:0 4px 8px}
.acct-rows{background:#fff;border:1px solid var(--gray-200);border-radius:14px;overflow:hidden}
.acct-row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;padding:14px 16px;border:none;background:none;cursor:pointer;font-size:.92rem;color:var(--gray-800);border-bottom:1px solid var(--gray-100);min-height:52px}

.acct-row-icon{color:var(--gray-400);display:flex;flex-shrink:0}

.acct-row-chev{color:var(--gray-300);flex-shrink:0}

.rep-dist-fill{height:100%;background:#f59e0b;border-radius:4px}
.rep-guide li{margin:6px 0;font-size:.86rem;color:var(--gray-700);line-height:1.4}

.notif-panel.open{display:block}
.notif-panel-header{padding:14px 16px;font-weight:700;font-size:.9rem;border-bottom:1px solid var(--gray-100);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.notif-panel-header button{font-size:.75rem;color:var(--brand);background:none;border:none;cursor:pointer;font-weight:600}
.notif-item{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--gray-50);cursor:pointer;transition:background .1s}
.notif-item:hover{background:var(--gray-50)}
.notif-item.unread{background:var(--brand-50)}
.notif-item .notif-icon{font-size:1.3rem;flex-shrink:0;padding-top:2px}
.notif-item .notif-body{flex:1;min-width:0}
.notif-item .notif-title{font-size:.82rem;font-weight:600;color:var(--gray-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.notif-item .notif-text{font-size:.75rem;color:var(--gray-500);margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.notif-item .notif-time{font-size:.65rem;color:var(--gray-400);margin-top:4px}
.notif-empty{text-align:center;padding:32px 16px;color:var(--gray-400);font-size:.85rem}
.notif-backdrop{display:none;position:fixed;inset:0;z-index:149}
.notif-backdrop.open{display:block}
.page-breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:12px;font-size:.82rem;color:var(--gray-500)}
.breadcrumb-back{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--brand);cursor:pointer;font-size:.82rem;font-weight:600;padding:4px 8px;border-radius:var(--radius);transition:background .1s}
.breadcrumb-back:hover{background:var(--brand-50)}
.breadcrumb-sep{color:var(--gray-300)}
.topbar-page-title{display:none;font-size:.88rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px}
.sidebar-profile{display:flex;align-items:center;gap:10px;padding:14px 20px 18px;border-bottom:1px solid var(--gray-100);margin-bottom:8px}
.sidebar-avatar{width:36px;height:36px;border-radius:50%;background:var(--brand);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:700;flex-shrink:0}
.sidebar-profile-info{flex:1;min-width:0}
.sidebar-profile-name{font-size:.85rem;font-weight:600;color:var(--gray-800);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-profile-role{font-size:.72rem;color:var(--gray-500);text-transform:capitalize}
.sidebar-section{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--gray-400);padding:14px 20px 6px;margin-top:4px}
.sidebar-divider{height:1px;background:var(--gray-100);margin:8px 20px}
.sidebar-footer{margin-top:auto;border-top:1px solid var(--gray-100);padding-top:8px}
.sidebar-item.logout-item{color:var(--gray-500)}
.sidebar-item.logout-item:hover{color:var(--danger);background:var(--danger-light)}
.tab-item::after{content:'';position:absolute;top:5px;left:50%;transform:translateX(-50%) scaleX(0);width:22px;height:3px;background:var(--nav-green);border-radius:2px;transition:transform .2s ease}
.tab-item.active::after{transform:translateX(-50%) scaleX(1)}
@media(max-width:768px){
  .bottom-tabs{display:block}
  .content{padding-bottom:var(--content-bottom-pad)!important}
  .topbar-page-title{display:block}
  .topbar-user{display:none}
  .topbar{padding:env(safe-area-inset-top,0px) 14px 0}
  .topbar-role{display:none}
  .topbar-signout{display:none}

}

  .tab-item{min-width:48px;font-size:.6rem}
  .tab-item .tab-icon{font-size:1.2rem}
}

// ---- Toast Notification System ----
function showToast(message, type='info', duration=4000) {
  const container = document.getElementById('toast-container');
  if (!container) return;
  const icons = {success:'\u2705', error:'\u274C', info:'\u2139\uFE0F', warn:'\u26A0\uFE0F'};
  const toast = document.createElement('div');
  toast.className = 'toast toast-' + type;
  toast.innerHTML = '<span class="toast-icon">' + (icons[type]||'') + '</span><span class="toast-msg">' + message + '</span><button class="toast-close" onclick="this.parentElement.remove()">\u00D7</button>';
  container.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'toastOut .3s forwards';
    setTimeout(() => toast.remove(), 300);
  }, duration);
}

function _t(key) {
  var entry = _translations[key];
  if (!entry) return key;
  return entry[_lang] || entry['es'] || key;
}

function setLanguage(lang) {
  _lang = lang;
  localStorage.setItem('lever_lang', lang);
  try { document.documentElement.lang = lang; } catch(e) {}
  if (_user) {
    var _currentRole = _user.role;
    buildSidebarImproved(_currentRole, currentRoute());
    render();
  }
}

function applyAuthLang(lang) {
  var isRegister = document.getElementById('tab-register')?.classList.contains('active');
  setLanguage(lang);
  renderAuth(isRegister ? 'register' : 'login');
}

let _notifications = [];
let _notifPanelOpen = false;

var _locallyRead = new Set();
async function fetchNotifications() {
  if (!_token) return;
  try {
    const res = await api('GET', '/api/notifications');
    _notifications = Array.isArray(res) ? res : (res.items || []);
    // A refetch racing an in-flight mark-as-read must not resurrect badges.
    _notifications.forEach(function(n) { if (_locallyRead.has(n.id)) n.read = true; });
    updateNotifBadges();
  } catch(e) { /* silent */ }
}

var _lastBadgeSig = '';
function updateNotifBadges() {
  const unread = _notifications.filter(n => !n.read).length;
  if (_lastNotifCount >= 0 && unread > _lastNotifCount) { playNotifSound(); }
  _lastNotifCount = unread;
  const bellCount = document.getElementById('bell-count');   // admin only
  if (bellCount) bellCount.textContent = unread > 0 ? (unread > 9 ? '9+' : unread) : '';
  // Tabs light up per feature: re-render the bottom nav when counts change.
  // (updateBottomTabs calls back into here; the unchanged signature stops it.)
  const sig = JSON.stringify(notifTabCounts());
  if (sig !== _lastBadgeSig) {
    _lastBadgeSig = sig;
    const role = _user && _user.role;
    if (role && document.getElementById('bottom-tabs') && document.getElementById('app-shell')) {
      updateBottomTabs(role, currentRoute());
    }
  }
}

function toggleNotifPanel() {
  _notifPanelOpen = !_notifPanelOpen;
  const panel = document.getElementById('notif-panel');
  const backdrop = document.getElementById('notif-backdrop');
  if (panel) panel.classList.toggle('open', _notifPanelOpen);
  if (backdrop) backdrop.classList.toggle('open', _notifPanelOpen);
  if (_notifPanelOpen) renderNotifPanel();
}

function closeNotifPanel() {
  _notifPanelOpen = false;
  const panel = document.getElementById('notif-panel');
  const backdrop = document.getElementById('notif-backdrop');
  if (panel) panel.classList.remove('open');
  if (backdrop) backdrop.classList.remove('open');
}

function renderNotifPanel() {
  const panel = document.getElementById('notif-panel');
  if (!panel) return;
  const unread = _notifications.filter(n => !n.read);
  const recent = _notifications.slice(0, 15);
  if (recent.length === 0) {
    panel.innerHTML = '<div class="notif-panel-header"><span>' + _t('notif.title') + '</span></div><div class="notif-empty">' + _t('notif.empty') + '</div>';
    return;
  }
  const iconMap = {job_update:'\ud83d\udd27', new_request:'\ud83d\udccb', review:'\u2b50', system:'\ud83d\udd14', message:'\ud83d\udcac'};
  panel.innerHTML = '<div class="notif-panel-header"><span>' + _t('notif.title') + ' ' + (unread.length > 0 ? '('+unread.length+')' : '') + '</span>' + (unread.length > 0 ? '<button onclick="markAllRead()">' + _t('notif.markRead') + '</button>' : '') + '</div>' + recent.map(function(n) {
    return '<div class="notif-item ' + (n.read ? '' : 'unread') + '" onclick="handleNotifClick(' + n.id + ', \'' + (n.link || '') + '\')">' +
      '<span class="notif-icon">' + (iconMap[n.type] || '\ud83d\udd14') + '</span>' +
      '<div class="notif-body"><div class="notif-title">' + escHtml(n.title || '') + '</div>' +
      '<div class="notif-text">' + escHtml(n.message || '') + '</div>' +
      '<div class="notif-time">' + timeAgo(n.created_at) + '</div></div></div>';
  }).join('');
}

async function markAllRead() {
  try {
    await api('PUT', '/api/notifications/read-all');
    _notifications.forEach(function(n) { n.read = true; });
    updateNotifBadges();
    renderNotifPanel();
  } catch(e) { showToast('Error: ' + e.message, 'error'); }
}

async function handleNotifClick(id, link) {
  try { await api('PUT', '/api/notifications/' + id + '/read'); } catch(e) {}
  var n = _notifications.find(function(x) { return x.id === id; });
  if (n) n.read = true;
  updateNotifBadges();
  closeNotifPanel();
  if (link) route(link.startsWith('#') ? link : '#' + link);
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  var d = new Date(dateStr);
  var now = new Date();
  var secs = Math.floor((now - d) / 1000);
  if (secs < 60) return 'ahora';
  if (secs < 3600) return Math.floor(secs/60) + 'm';
  if (secs < 86400) return Math.floor(secs/3600) + 'h';
  if (secs < 604800) return Math.floor(secs/86400) + 'd';
  return d.toLocaleDateString('es-EC', {month:'short', day:'numeric'});
}

function escHtml(s) {
  return escapeHtml(s);  // unified — escapes quotes too (attribute-safe)
}

// Map any (possibly nested) route to the primary customer tab that owns it, so
// deep pages keep the correct bottom tab highlighted. Non-client roles keep the
// original exact-match behaviour.
function activeTabHash(hash, role) {
  if (role !== 'client') return hash;
  if (hash === '#/' || hash === '#' || hash === '#/home') return '#/';
  if (hash === '#/services' || hash.startsWith('#/services/') || hash.startsWith('#/service/') ||
      hash === '#/request/new' || hash === '#/request/review' || hash === '#/finish-request' ||
      hash === '#/auth-gate' || hash === '#/otra-ciudad' || hash === '#/cobertura') return '#/services';
  if (hash === '#/requests' || hash.startsWith('#/request/') || hash.startsWith('#/activity') ||
      hash === '#/messages' || hash.startsWith('#/chat/')) return '#/requests';
  if (hash === '#/profile' || hash.startsWith('#/account') || hash === '#/settings' ||
      hash === '#/vehicles' || hash === '#/map') return '#/profile';

}

// ---- Job Status Tracker Builder ----
function buildJobTracker(statuses, currentStatus) {
  if (!statuses || statuses.length === 0) return '';
  const workStatuses = statuses.filter(s => s !== 'cancelled');
  const currentIdx = workStatuses.indexOf(currentStatus);
  const isCancelled = currentStatus === 'cancelled';
  
  let html = '<div class="job-tracker">';
  workStatuses.forEach((s, i) => {
    if (i > 0) {
      const lineDone = !isCancelled && i <= currentIdx ? ' done' : '';
      html += '<div class="tracker-line' + lineDone + '"></div>';
    }
    let dotClass = 'tracker-dot';
    let labelClass = 'tracker-label';
    if (isCancelled) {
      dotClass += i === 0 ? ' cancelled' : '';
      labelClass += i === 0 ? ' active' : '';
    } else if (i < currentIdx) {
      dotClass += ' done';
      labelClass += ' done';
    } else if (i === currentIdx) {
      dotClass += ' active';
      labelClass += ' active';
    }
    const icon = i < currentIdx && !isCancelled ? '\u2713' : (i + 1);
    const label = s.replace(/_/g, ' ');
    html += '<div class="tracker-step"><div class="' + dotClass + '">' + icon + '</div><div class="' + labelClass + '">' + label + '</div></div>';
  });
  if (isCancelled) {
    html += '<div class="tracker-line"></div><div class="tracker-step"><div class="tracker-dot cancelled">\u2717</div><div class="tracker-label active" style="color:var(--danger)">cancelled</div></div>';
  }
  html += '</div>';
  return html;
}

// In the Capacitor native app, the WebView's own origin is https://localhost —
// relative "same-origin" API calls would go nowhere, so point at the real backend.
const IS_NATIVE = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
const PROD_API_ORIGIN = 'https://lever-ec.com';
const API = IS_NATIVE ? PROD_API_ORIGIN : '';  // native: absolute URL, web/PWA: same-origin

// Which native app shell this is ('client' | 'provider'), read from the
// native capacitor.config.json — null on web/PWA, where both roles coexist.
const APP_FLAVOR = (IS_NATIVE && window.Capacitor.getConfig && window.Capacitor.getConfig().appFlavor) || null;
const APP_FLAVOR_ROLE = APP_FLAVOR === 'provider' ? 'mechanic' : (APP_FLAVOR === 'client' ? 'client' : null);

// ---- HTTP helpers ----
async function api(method, path, body, noAuth=false) {
  const headers = {'Content-Type':'application/json'};
  if (_token && !noAuth) headers['Authorization'] = 'Bearer '+_token;
  const res = await fetch(API+path, {method, headers, body: body ? JSON.stringify(body) : undefined});
  if (res.status === 204) return null;
  const data = await res.json().catch(()=>({detail:'No response body'}));
  if (!res.ok) {
    // FastAPI errors: detail is usually a string, but Pydantic validation
    // errors return an ARRAY of {loc,msg,type}. Stringifying that array
    // naively yields "[object Object]" — extract the readable messages.
    const dt = data && data.detail;
    let msg;
    if (Array.isArray(dt)) msg = dt.map(e => (e && e.msg) ? e.msg : JSON.stringify(e)).join('; ');
    else if (typeof dt === 'string') msg = dt;
    else if (dt) msg = JSON.stringify(dt);
    else msg = JSON.stringify(data);
    throw new Error(msg);
  }
  return data;
}
const get  = (p)       => api('GET',p);
const post = (p,b)     => api('POST',p,b);
const patch= (p,b)     => api('PATCH',p,b);
const del  = (p)       => api('DELETE',p);

// ---- Security: HTML escaping to prevent XSS ----
function escapeHtml(str) {
  if (str == null) return '';
  // Escapes all five HTML-significant characters, incl. quotes, so the
  // result is safe in BOTH text and attribute (value="...") contexts.
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function profLabel(key) { var tkey = 'prof.' + key; var t = _t(tkey); return t !== tkey ? t : (_professions[key]?.label || key); }

// ---- Router (dual-mode) ----
// Inside the Capacitor native apps we keep hash routing — file:// / capacitor://
// have no server to rewrite paths, and hash routing is the reliable choice there.
// On the web we use clean History-API paths so the URL reads '/home/' instead of
// '/#/':   '#/' <-> '/home/',   '#/x/y' <-> '/x/y/'.
// Internal route tokens stay in the original '#/...' form everywhere else in the
// app, so only the address bar and these few helpers change behaviour.
var USE_PATH_ROUTING = !IS_NATIVE;

function hashToPath(hash) {
  hash = hash || '#/';
  if (hash === '#' || hash === '#/') return '/home/';
  var p = hash.charAt(0) === '#' ? hash.slice(1) : hash;   // '#/x/y' -> '/x/y'
  if (p.charAt(p.length - 1) !== '/') p += '/';            // ensure trailing slash
  return p;
}
function pathToHash(pathname) {
  if (!pathname || pathname === '/' || pathname === '/home' || pathname === '/home/') return '#/';
  var p = pathname.replace(/\/+$/, '');                    // strip trailing slash(es)
  if (p.charAt(0) !== '/') p = '/' + p;
  return '#' + p;                                          // '/x/y' -> '#/x/y'
}
// The canonical current route in '#/...' form, regardless of routing mode.
function currentRoute() {
  return USE_PATH_ROUTING ? pathToHash(window.location.pathname) : (window.location.hash || '#/');
}
function route(hash) {
  if (USE_PATH_ROUTING) {
    var path = hashToPath(hash);
    if (path !== window.location.pathname) window.history.pushState({}, '', path);
    render();
  } else {
    window.location.hash = hash;   // hashchange listener triggers render()
  }
}
if (USE_PATH_ROUTING) {
  // Preserve legacy hash links (and the old '/#/' URL the app used to show):
  // rewrite any '#/...' in the address bar to its path form before the first
  // render, so old bookmarks and shared links keep working.
  if (window.location.hash && window.location.hash.length > 1) {
    try { window.history.replaceState({}, '', hashToPath(window.location.hash)); } catch (e) {}
  }
  window.addEventListener('popstate', render);
  // Route in-app hash anchors (e.g. <a href="#/services/x">) through the
  // History-API router instead of letting them leave a stale '#/...' in the URL.
  document.addEventListener('click', function(e) {
    var a = e.target && e.target.closest ? e.target.closest('a[href^="#/"]') : null;
    if (!a) return;
    if (e.metaKey || e.ctrlKey || e.shiftKey || e.button) return;  // allow open-in-new-tab etc.
    e.preventDefault();
    route(a.getAttribute('href'));
  });
} else {
  window.addEventListener('hashchange', render);
}

// ── Accessibility: mark decorative inline SVGs as hidden from AT ──
// Every SVG in this app is a decorative icon that sits next to visible text
// (brand mark by "Lever", icons in labelled buttons, rating stars beside a
// numeric value). None convey information a screen reader needs, so we hide
// them and take them out of the tab order. An observer keeps this true as the
// SPA re-renders. Any SVG that ever needs to be meaningful can opt out by
// carrying its own aria-label or role="img".
function markDecorativeSvgs(root) {
  (root || document).querySelectorAll('svg:not([aria-hidden]):not([role="img"]):not([aria-label])').forEach(function(s) {
    s.setAttribute('aria-hidden', 'true');
    s.setAttribute('focusable', 'false');
  });
}
window.addEventListener('load', async () => {
  await loadProfessions();
  render();
  markDecorativeSvgs();
  var appEl = document.getElementById('app');
  if (appEl && 'MutationObserver' in window) {
    new MutationObserver(function(muts) {
      for (var i = 0; i < muts.length; i++) {
        if (muts[i].addedNodes && muts[i].addedNodes.length) { markDecorativeSvgs(appEl); break; }
      }
    }).observe(appEl, {childList: true, subtree: true});
  }
});

async function render() {
  const _hash = currentRoute();
  // Keep <html lang> in sync with the active UI language (a11y).
  try { if (document.documentElement.lang !== _lang) document.documentElement.lang = _lang; } catch(e) {}
  // Language route shortcuts: #/us -> English, #/es -> Spanish
  if (_hash === '#/us' || _hash === '#/es') {
    _lang = _hash === '#/us' ? 'en' : 'es';
    localStorage.setItem('lever_lang', _lang);
    try { document.documentElement.lang = _lang; } catch(e) {}
    route('#/settings');
    // Force re-render if we were already on #/settings (hashchange won't fire)
    setTimeout(render, 50);
    return;
  }
  // In-app legal viewer (native) — reachable logged in or out.
  if (_hash === '#/legal/terms' || _hash === '#/legal/privacy') {
    renderLegalDoc(_hash.split('/')[2]); return;
  }
  if (!_token) {
    if (_hash === '#/login') { renderAuth('login'); return; }
    if (_hash === '#/signup') { renderAuth('register'); return; }
    // Role-specific registration entry points (kept distinct per spec).
    if (_hash === '#/registro/cliente') { renderAuth('register', 'client'); return; }
    if (_hash === '#/registro/profesional') { renderAuth('register', 'mechanic'); return; }
    if (_hash === '#/browse') { renderGuestBrowse(); return; }
    if (_hash === '#/support') { renderSupport(); return; }
    if (_hash === '#/reset-password') { renderResetPassword(); return; }
    // Guest service discovery + request preview (deferred auth — Phase 2)
    if (isGuestFlowHash(_hash)) { renderGuestFlowRoute(_hash); return; }
    // Native provider app: providers must sign in first. The CLIENT native
    // app opens into guest discovery instead of forcing a login screen.
    if (IS_NATIVE) {
      if (APP_FLAVOR_ROLE === 'client') { renderGuestFlowRoute('#/services'); return; }
      renderAuth('login'); return;
    }
    renderLanding(); return;
  }
  // Verification gate — ISO 27001 A.9.4.2: email ownership required before access
  if (_user && _user.email_verified === false) {
    renderVerification(); return;
  }
  // Authenticated users can use the catalog/request funnel too (clients only)
  if (isGuestFlowHash(_hash)) {
    if (_user?.role === 'client') { renderGuestFlowRoute(_hash); return; }

  // A finished draft waiting to be sent takes priority over the dashboard —

  if (_user?.role === 'client' && (_hash === '#/' || _hash === '#') && guestDraftReady()) {

        <div class="topbar-right">

        '<line x1="42" y1="33" x2="70" y2="22" stroke-width="4" stroke-linecap="round"/>' +

// ---- Modal helper ----
function showModal(title, bodyHtml, footerHtml='') {
  const m = document.createElement('div');
  m.className = 'modal-backdrop';
  m.id = 'modal-root';
  m.innerHTML = `
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title">${title}</div>
        <button class="modal-close" onclick="closeModal()">\u2715</button>
      </div>
      ${bodyHtml}
      ${footerHtml ? '<div class="mt-4">'+footerHtml+'</div>' : ''}
    </div>`;
  document.body.appendChild(m);
}
function closeModal() {
  document.getElementById('modal-root')?.remove();
}

async function clientView(hash, el) {
  // Legacy routes → new customer sections (safe redirects).
  const _legacy = {'#/dashboard':'#/', '#/categories':'#/services', '#/history':'#/requests'};
  if (_legacy[hash]) { route(_legacy[hash]); return; }
  if (hash==='#/'||hash==='#'||hash==='#/home')  return renderClientHome(el);
  if (hash==='#/requests'||hash==='#/activity')  return renderClientRequests(el);
  if (hash.startsWith('#/activity/')) return renderRequestDetail(el, hash.split('/')[2]);
  if (hash.startsWith('#/request/')) return renderRequestDetail(el, hash.split('/')[2]);
  if (hash==='#/messages')           return renderMessages(el, null);
  if (hash.startsWith('#/chat/'))    return renderMessages(el, hash.split('/')[2]);
  if (hash==='#/account/personal'||hash==='#/profile/edit') return renderProfileEdit(el);
  if (hash==='#/account/reputation') return renderReputation(el);
  if (hash==='#/profile'||hash==='#/account') return renderClientProfile(el);
  if (hash==='#/map')                return renderMapView(el);
  if (hash==='#/vehicles')           return renderVehicles(el);
  if (hash==='#/settings')           return renderSettings(el);
  el.innerHTML = emptyState('<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>','Page not found');
}

// Home service search (debounced, accent/synonym-aware via /api/catalog/search)
let _homeSearchTimer = null, _homeSuggestions = [];
function homeSearchInput() {
  clearTimeout(_homeSearchTimer);
  _homeSearchTimer = setTimeout(runHomeSearch, 300);
}
async function runHomeSearch() {
  const inp = document.getElementById('home-search-input');
  const box = document.getElementById('home-suggest');
  if (!inp || !box) return;
  const q = inp.value.trim();
  if (q.length < 2) { box.hidden = true; box.innerHTML = ''; inp.setAttribute('aria-expanded', 'false'); return; }
  try {
    const results = await api('GET', '/api/catalog/search?q=' + encodeURIComponent(q) + '&lang=' + _lang, undefined, true);
    _homeSuggestions = Array.isArray(results) ? results : [];
    let html = _homeSuggestions.length
      ? _homeSuggestions.slice(0, 7).map(function(s, i) {
          return '<button type="button" class="home-suggest-item" role="option" onclick="homePickSuggestion(' + i + ')"><span aria-hidden="true">' + (s.icon || '🔧') + '</span><span>' + escapeHtml(svcName(s)) + '</span></button>';
        }).join('')
      : '<div class="home-suggest-empty">' + escapeHtml(_t('guest.noSuggestions')) + '</div>';
    html += '<button type="button" class="home-suggest-item home-suggest-viewall" onclick="homeViewAll()">' + escapeHtml(_t('home.viewAllResults')) + ' →</button>';
    box.innerHTML = html;
    box.hidden = false;
    inp.setAttribute('aria-expanded', 'true');
  } catch (e) {
    box.innerHTML = '<div class="home-suggest-empty">' + escapeHtml(_t('home.searchFailed')) + '</div>';
    box.hidden = false;
  }
}
function homePickSuggestion(i) {
  const s = _homeSuggestions[i];
  if (s && s.key) route('#/service/' + s.key);
}
function homeViewAll() {
  const inp = document.getElementById('home-search-input');
  const q = inp ? inp.value.trim() : '';
  try { localStorage.setItem('lever_services_q', q); } catch (e) {}
  route('#/services');
}
function homeSearchKey(e) {
  if (e.key === 'Enter') { e.preventDefault(); homeViewAll(); }
  else if (e.key === 'Escape') { const b = document.getElementById('home-suggest'); if (b) { b.hidden = true; } }
}

// ---- Activity: status-filtered, mobile-friendly request cards (spec \u00a713) ----
let _activityFilter = 'all';
let _activityReqs = null;
const _ACTIVITY_ACTIVE = ['pending', 'assigned', 'in_progress'];

async function renderClientRequests(el) {
  el.innerHTML = pageHeader(_t('activity.title'),
      `<button class="btn btn-primary" onclick="showNewRequest()">${_t('req.newRequest')}</button>`) +
    '<div class="act-list"><div class="gskel" style="height:80px;border-radius:14px;margin-bottom:10px"></div>' +
    '<div class="gskel" style="height:80px;border-radius:14px"></div></div>';
  try {
    _activityReqs = await get('/api/client/requests');
  } catch (e) {
    el.innerHTML = pageHeader(_t('activity.title')) + alert_el('error', _t('activity.loadFailed'));
    return;
  }
  renderActivityBody(el);
}

function setActivityFilter(f) {
  _activityFilter = f;
  const el = document.getElementById('content');
  if (el) renderActivityBody(el);
}

function renderActivityBody(el) {
  const reqs = _activityReqs || [];
  const counts = {
    all: reqs.length,
    active: reqs.filter(r => _ACTIVITY_ACTIVE.includes(r.status)).length,
    completed: reqs.filter(r => r.status === 'completed').length,
    cancelled: reqs.filter(r => r.status === 'cancelled').length,
  };
  const chips = [['all', 'activity.all'], ['active', 'activity.active'], ['completed', 'activity.completed'], ['cancelled', 'activity.cancelled']]
    .map(([k, label]) => `<button class="act-chip ${_activityFilter === k ? 'active' : ''}" aria-pressed="${_activityFilter === k}" onclick="setActivityFilter('${k}')">${escapeHtml(_t(label))}${counts[k] ? ` <span class="act-chip-n">${counts[k]}</span>` : ''}</button>`)
    .join('');

  let list = reqs;
  if (_activityFilter === 'active') list = reqs.filter(r => _ACTIVITY_ACTIVE.includes(r.status));
  else if (_activityFilter === 'completed') list = reqs.filter(r => r.status === 'completed');
  else if (_activityFilter === 'cancelled') list = reqs.filter(r => r.status === 'cancelled');

  let html = pageHeader(_t('activity.title'),
    `<button class="btn btn-primary" onclick="showNewRequest()">${_t('req.newRequest')}</button>`);

  if (!reqs.length) {
    html += emptyState('<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>',
      _t('activity.emptyTitle'), _t('activity.emptyBody'));
    html += `<div style="text-align:center;margin-top:-6px"><button class="btn btn-primary" onclick="route('#/services')">${_t('activity.explore')}</button></div>`;
    el.innerHTML = html;
    return;
  }

  html += `<div class="act-chips" role="tablist" aria-label="${escapeHtml(_t('activity.title'))}">${chips}</div>`;
  if (!list.length) {
    html += `<div class="act-none">${escapeHtml(_t('activity.noneInFilter'))}</div>`;
  } else {
    html += `<div class="act-list">${list.map(r => `
      <button class="act-card" onclick="route('#/request/${r.id}')">
        <div class="act-card-top"><span class="act-card-title">${escapeHtml(r.title)}</span>${badge(r.status)}</div>
        <div class="act-card-meta">${profBadge(r.profession_type)}<span aria-hidden="true">\u00b7</span>${fmtDate(r.created_at)}</div>
        ${r.professional_name ? `<div class="act-card-pro"><span aria-hidden="true">\ud83d\udc77</span> ${escapeHtml(r.professional_name)}${r.professional_rating != null ? ` <span aria-hidden="true">\u00b7</span> <span aria-hidden="true">\u2605</span> ${r.professional_rating.toFixed(1)}` : ''}${r.professional_verified ? ` <span aria-hidden="true">\u00b7</span> <span class="act-verif">\u2713 ${escapeHtml(_t('activity.verified'))}</span>` : ''}</div>` : ''}
        ${r.budget_min != null ? `<div class="act-card-price">${fmtMoney(r.budget_min)} \u2013 ${fmtMoney(r.budget_max)}</div>` : ''}
        ${r.status === 'completed' ? (r.has_review ? `<div class="act-card-done">\u2713 ${escapeHtml(_t('activity.reviewSent'))}</div>` : `<div class="act-card-cta">\u2b50 ${escapeHtml(_t('activity.rateProfessional'))}</div>`) : ''}
      </button>`).join('')}</div>`;
  }
  el.innerHTML = html;
}

async function loadVehiclesForSelection() {
  const sel = document.getElementById('sr-vehicle');
  if (!sel) return;
  try {
    const vehicles = await get('/api/client/vehicles');
    vehicles.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v.id;
      opt.textContent = v.year+' '+v.make+' '+v.model+(v.license_plate?' ('+v.license_plate+')':'');
      sel.appendChild(opt);
    });
  } catch (e) { /* vehicle list is optional, ignore failures */ }
}

function onProfessionChange() {
  const sel = document.getElementById('sr-prof');
  if (!sel) return;
  const prof = sel.value;
  const p = _professions[prof];

  // Reload workers if scheduled is selected
  const urgSel = document.getElementById('sr-urgency');
  if (urgSel && urgSel.value === 'scheduled') loadWorkersForSelection();
}

// ---- Urgency change: show/hide worker panel ----
function onUrgencyChange() {
  const urg = document.getElementById('sr-urgency').value;
  const panel = document.getElementById('sr-worker-panel');
  if (!panel) return;
  if (urg === 'scheduled') {
    panel.classList.add('visible');
    loadWorkersForSelection();
  } else {
    panel.classList.remove('visible');
    document.getElementById('sr-selected-worker').value = '';
  }
}

async function loadWorkersForSelection() {
  const profSel = document.getElementById('sr-prof');
  const prof = profSel ? profSel.value : '';
  const listEl = document.getElementById('sr-worker-list');
  if (!prof) {
    listEl.innerHTML = '<div class="worker-search-msg">Please select a profession first</div>';
    return;
  }
  listEl.innerHTML = '<div class="worker-search-msg">Loading providers...</div>';
  try {
    const res = await get('/api/search/providers?profession=' + prof + '&sort_by=rating');
    const providers = res.providers || [];
    if (providers.length === 0) {
      listEl.innerHTML = '<div class="worker-search-msg">'+_t('ws.noProviders')+'</div>';
      return;
    }
    listEl.innerHTML = providers.map(p => {
      const initials = (p.user_name || 'P').substring(0,2).toUpperCase();
      const stars = p.avg_rating ? '\u2B50 ' + p.avg_rating.toFixed(1) : 'New';
      const jobs = p.completed_jobs || 0;
      return '<div class="worker-card" onclick="selectWorker(this, ' + p.user_id + ')" data-worker-id="' + p.user_id + '">' +
        '<div class="worker-avatar">' + initials + '</div>' +
        '<div class="worker-info">' +
          '<div class="worker-name">' + (p.user_name || 'Provider') + '</div>' +
          '<div class="worker-meta"><span class="worker-rating">' + stars + '</span> &middot; ' + jobs + ' jobs done</div>' +
        '</div>' +
      '</div>';
    }).join('');

// ---- Categorized Profession Dropdown ----
function buildProfDropdownItems(selectedKey, filter) {
  var html = '';
  var filterLower = (filter || '').toLowerCase();
  var catOrder = ['home_trades', 'property_services', 'auto_equipment', 'specialty'];
  var hasCats = Object.keys(_profCategories).length > 0;

  if (hasCats) {
    catOrder.forEach(function(catKey) {
      var cat = _profCategories[catKey];
      if (!cat) return;
      var profs = (cat.professions || []).filter(function(p) {
        if (!filterLower) return true;
        return profLabel(p.key).toLowerCase().indexOf(filterLower) >= 0 || p.key.indexOf(filterLower) >= 0;
      });
      if (profs.length === 0) return;
      var catLabel = _t('cat.' + catKey);
      if (catLabel === 'cat.' + catKey) {
        catLabel = (cat.label && cat.label[_lang]) ? cat.label[_lang] : catKey;
      }
      html += '<div class="prof-dd-category">' + catLabel + '</div>';
      profs.forEach(function(p) {
        var sel = p.key === selectedKey ? ' selected' : '';
        html += '<div class="prof-dd-item' + sel + '" data-key="' + p.key + '" onclick="selectProf(\'' + p.key + '\')">';
        html += '<span class="prof-dd-item-icon">' + (p.icon || profIcon(p.key)) + '</span>';
        html += '<span class="prof-dd-item-label">' + profLabel(p.key) + '</span>';
        html += '<span class="prof-dd-check">\u2713</span>';
        html += '</div>';
      });
    });
  } else {
    // Fallback: flat list
    Object.keys(_professions).forEach(function(k) {
      if (filterLower && profLabel(k).toLowerCase().indexOf(filterLower) < 0 && k.indexOf(filterLower) < 0) return;
      var sel = k === selectedKey ? ' selected' : '';
      html += '<div class="prof-dd-item' + sel + '" data-key="' + k + '" onclick="selectProf(\'' + k + '\')">';
      html += '<span class="prof-dd-item-icon">' + profIcon(k) + '</span>';
      html += '<span class="prof-dd-item-label">' + profLabel(k) + '</span>';
      html += '<span class="prof-dd-check">\u2713</span>';
      html += '</div>';
    });
  }
  if (!html) html = '<div class="prof-dd-empty">' + (_lang==='es'?'Sin resultados':'No results') + '</div>';
  return html;
}

// ---- Reusable Photon address autosuggest (shared by the classic form) ----
// Wires an <input> + a suggestion <div> (both must already be in the DOM).
// onPick(label, lat, lng) fires when a match is chosen. Backend-proxied via
// /api/search/address-search so the CSP (connect-src 'self') is respected.
let _srCoords = null;
let _addrSuggestTimer = null;
function attachAddressAutosuggest(inputId, boxId, onPick) {
  const inp = document.getElementById(inputId);
  const box = document.getElementById(boxId);
  if (!inp || !box) return;
  box.__addr = { items: [], inp: inp, onPick: onPick };
  inp.addEventListener('input', function() {
    clearTimeout(_addrSuggestTimer);
    _addrSuggestTimer = setTimeout(function() { _runAddrSuggest(inp, box); }, 450);
  });
}
async function _runAddrSuggest(inp, box) {
  const q = inp.value.trim();
  if (q.length < 3) { box.hidden = true; box.innerHTML = ''; return; }
  try {
    const results = await api('GET', '/api/search/address-search?q=' + encodeURIComponent(q));
    box.__addr.items = Array.isArray(results) ? results : [];
    if (!box.__addr.items.length) {
      box.innerHTML = '<div class="gf-suggest-empty">' + _t('guest.noSuggestions') + '</div>';
    } else {
      box.innerHTML = box.__addr.items.map(function(s, i) {
        return '<button type="button" class="gf-suggest-item" role="option" onclick="_pickAddrSuggest(\'' + box.id + '\',' + i + ')">📍 ' + escapeHtml(s.label) + '</button>';
      }).join('');
    }
    box.hidden = false;
  } catch(e) { box.hidden = true; box.innerHTML = ''; }
}
function _pickAddrSuggest(boxId, i) {
  const box = document.getElementById(boxId);
  if (!box || !box.__addr) return;
  const s = box.__addr.items[i];
  if (!s) return;
  box.__addr.inp.value = s.label;
  box.hidden = true; box.innerHTML = '';
  if (box.__addr.onPick) box.__addr.onPick(s.label, s.latitude, s.longitude);
}

async function submitNewRequest() {
  const profType  = document.getElementById('sr-prof').value;
  const vehicleId = document.getElementById('sr-vehicle')?.value;
  const title       = document.getElementById('sr-title').value.trim();
  const description = document.getElementById('sr-desc').value.trim();
  const location    = document.getElementById('sr-loc').value.trim();
  const errEl = document.getElementById('sr-err');
  // Friendly, Spanish-first checks that mirror the backend's minimums, so the
  // user gets a clear message instead of a raw validation error.
  if (title.length < 5) { errEl.innerHTML = alert_el('error', _lang==='es' ? 'El título debe tener al menos 5 caracteres.' : 'Title must be at least 5 characters.'); return; }
  if (description.length < 10) { errEl.innerHTML = alert_el('error', _lang==='es' ? 'La descripción debe tener al menos 10 caracteres.' : 'Description must be at least 10 characters.'); return; }
  if (location.length < 3) { errEl.innerHTML = alert_el('error', _lang==='es' ? 'Ingresa la dirección o zona del servicio.' : 'Enter the service address or area.'); return; }
  const payload = {
    title: title,
    description: description,
    location: location,
    urgency: document.getElementById('sr-urgency').value,
    profession_type: profType,
    // Structured location for the Guayaquil market check. The server re-validates
    // and assigns market_code itself (these fields are stripped before insert).
    // Without them the request is rejected as ADDRESS_OUTSIDE_GUAYAQUIL.
    city: _market.city,
    province: _market.province,
    country_code: 'EC',
    // Exact coordinates when the client picked an address suggestion (server
    // validates these against the Guayaquil service area; coords beat city).
    ...(_srCoords ? {latitude: _srCoords.lat, longitude: _srCoords.lng} : {}),
      // NOTE: preferred_mechanic_id removed - backend does not support this field yet.
    ...(vehicleId && {vehicle_id: parseInt(vehicleId)}),
  };
  try {
    const req = await post('/api/client/requests', payload);
    closeModal();
    showWaitingForAssignment(req, profType);
  } catch(e) {
    // Surface the market/coverage rejection as friendly copy, not the raw code.
    const outOfArea = /GUAYAQUIL|MARKET_NOT_ACTIVE|INVALID_LOCATION|SERVICE_NOT_AVAILABLE/i.test(e.message || '');
    document.getElementById('sr-err').innerHTML = alert_el('error', outOfArea ? _t('guest.outOfArea') : e.message);
  }
}


// ---- Assignment Celebration Sound ----
var _celebrationAudioCtx = null;
function playCelebrationSound() {
  try {
    if (!_celebrationAudioCtx) _celebrationAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    var ctx = _celebrationAudioCtx;
    var now = ctx.currentTime;
    var gain = ctx.createGain();
    gain.connect(ctx.destination);
    gain.gain.setValueAtTime(0.3, now);
    gain.gain.exponentialRampToValueAtTime(0.01, now + 1.5);
    // Triumphant ascending: C5, E5, G5, C6
    [523.25, 659.25, 783.99, 1046.50].forEach(function(freq, i) {
      var osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + i * 0.15);
      osc.connect(gain);
      osc.start(now + i * 0.15);
      osc.stop(now + i * 0.15 + 0.4);
    });
  } catch(e) { console.warn('Celebration sound failed:', e); }
}

    }
    if (s === 'completed' && req.job && req.job.completed_at) {
      html += '<div class="tracker-step-time">' + new Date(req.job.completed_at).toLocaleString() + '</div>';
    }

    html += '</div></div>';

        // Just update the tracker section
        var trackerEl = document.getElementById('status-tracker-' + requestId);
        if (trackerEl) {
          trackerEl.innerHTML = buildStatusTracker(data);
        }
        // Play celebration if assigned and not yet notified
        if (data.status === 'assigned' && trackerEl && !trackerEl.dataset.notified) {
          playCelebrationSound();
          trackerEl.dataset.notified = '1';
        }
      }
      _lastTrackerStatus = data.status;
      // Stop polling if completed or cancelled
      if (data.status === 'completed' || data.status === 'cancelled') {
        clearInterval(_trackerPollTimer);
        _trackerPollTimer = null;
      }
    }).catch(function(e) {
      console.warn('Tracker poll error:', e.message);
    });
  }, 5000);
}
function stopTrackerPolling() {
  if (_trackerPollTimer) { clearInterval(_trackerPollTimer); _trackerPollTimer = null; }
}

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19,
    }).addTo(map);

    const provUrl = '/api/search/map/providers' + (_providerFilter ? '?profession='+_providerFilter : '');
    const providers = await get(provUrl);
    const profColors = {
      home_cleaning:'#0284c7', handyman:'#d97706', plumbing:'#2563eb', electrical:'#ca8a04',
      painting:'#c026d3', construction:'#ea580c', gardening:'#16a34a', appliance_repair:'#0891b2',
      tech_support:'#6366f1', beauty:'#db2777', automotive:'#059669', moving:'#9333ea',
      home_security:'#475569', pets:'#f97316', events:'#e11d48', business_support:'#0369a1',
    };

      L.circleMarker([p.latitude, p.longitude], {
        radius: 10, fillColor: color, color: '#fff', weight: 2, fillOpacity: 0.9,
      }).addTo(map).bindPopup(
        '<strong>'+p.full_name+'</strong><br>'+
        profLabel(p.profession)+' &bull; '+fmtMoney(p.hourly_rate)+'/hr<br>'+
        '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>'.repeat(Math.round(p.avg_rating))+' '+p.avg_rating.toFixed(1)
      );
    });

    const reqUrl = '/api/search/map/requests' + (_providerFilter ? '?profession_type='+_providerFilter : '');
    const requests = await get(reqUrl);

    requests.forEach(r => {
      L.marker([r.latitude, r.longitude], {
        icon: L.divIcon({

          iconSize: [24, 24], iconAnchor: [12, 12],
        })
      }).addTo(map).bindPopup(
        '<strong>'+r.title+'</strong><br>'+
        profLabel(r.profession_type)+' &bull; '+r.urgency+'<br>'+
        r.location+'<br>'+
        (r.budget_min && r.budget_max ? fmtMoney(r.budget_min)+' - '+fmtMoney(r.budget_max) : '')
      );
    });

    const legend = L.control({position: 'bottomright'});
    legend.onAdd = function() {
      const div = L.DomUtil.create('div', '');
      div.style.cssText = 'background:#fff;padding:10px 14px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.15);font-size:12px;line-height:1.8';
      div.innerHTML = '<strong>Legend</strong><br>' +
        Object.entries(profColors).map(([k,c]) => '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+c+';margin-right:5px"></span>'+profLabel(k)).join('<br>') +
        '<br><span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#dc2626;margin-right:5px"></span>Service Request';
      return div;
    };
    legend.addTo(map);

    const allLatLngs = [
      ...providers.map(p=>[p.latitude,p.longitude]),
      ...requests.map(r=>[r.latitude,r.longitude]),
    ];
    if (allLatLngs.length > 1) map.fitBounds(allLatLngs, {padding:[40,40]});
  }, 50);
}

function openExternal(path) {
  // In the native apps, window.open navigates the WebView itself to the
  // website — stranding the user on the web experience (its header then leads
  // to the web landing). Keep support/legal IN-APP instead.
  if (IS_NATIVE) {
    if (path === '/support') { route('#/support'); return; }
    if (path === '/terms' || path === '/privacy') { route('#/legal' + path); return; }
  }
  try { window.open((typeof API!=='undefined' && API ? API : '') + path, '_blank'); }
  catch(e) { location.href = path; }
}

async function renderLegalDoc(kind) {   // 'terms' | 'privacy'
  const title = kind === 'terms' ? _t('acct.terms') : _t('acct.privacy');
  document.getElementById('app').innerHTML =

    '<button class="gbtn-ghost" onclick="history.back()">← ' + escapeHtml(_t('acct.back')) + '</button></div>';
  try {
    const res = await fetch((typeof API !== 'undefined' && API ? API : '') + '/' + kind);
    const doc = new DOMParser().parseFromString(await res.text(), 'text/html');
    // Our own server-authored document (same origin of trust as the app).
    document.getElementById('legal-body').innerHTML = doc.body ? doc.body.innerHTML : '';
  } catch (e) {
    document.getElementById('legal-body').innerHTML = alert_el('error', _t('activity.loadFailed'));

}
